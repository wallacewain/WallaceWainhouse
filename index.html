  <style>
    html, body { cursor: crosshair; }
    /* Hide site chrome when in fullscreen */

    :-webkit-full-screen header, :-webkit-full-screen footer, :-webkit-full-screen main { display: none !important; }
    #galaxy-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      background: #0e0e10;
    }
    header, main, footer { position: relative; z-index: 1; }
    .hero {
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 4rem;
    }
    .hero h1 { margin-bottom: 1rem; }
    .hero p { margin-bottom: 0; }
    .hero h1, .hero p { text-shadow: 0 0 40px #0e0e10, 0 0 80px #0e0e10; }
    .drag-hint {
      align-self: center;
      margin-top: 0.5rem;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .drag-hint svg { overflow: visible; animation: dh-pulse 2.4s ease-in-out infinite; }
    @keyframes dh-pulse {
      0%,100% { opacity: 0.45; filter: drop-shadow(0 0 3px rgba(255,255,255,0.25)); }
      50%      { opacity: 1.0;  filter: drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
    }
    .dh-ghost {
      position: fixed; pointer-events: none; z-index: 10;
      transform: translate(-50%,-50%);
    }
    .dh-ghost svg { overflow: visible; filter: drop-shadow(0 0 16px rgba(255,255,255,0.5)); }
    .console-pane {
      position: fixed; bottom: 1.4rem; right: 1.4rem;
      width: min(260px, 42vw);
      display: flex; flex-direction: column; align-items: flex-start; gap: 0.05rem;
      pointer-events: none; z-index: 5;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.68rem; line-height: 1.65;
    }
    .console-line { color: rgba(140,255,170,0.9); white-space: normal; transition: opacity 0.6s ease; }
    .console-cursor { animation: con-blink 0.85s step-end infinite; }
    @keyframes con-blink { 0%,100%{opacity:1} 50%{opacity:0} }

  <script>
  (function () {
    const canvas = document.getElementById('galaxy-bg');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Fullscreen ────────────────────────────────────────────────────────
    const fsBtn = document.getElementById('fsBtn');
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
      fsBtn.style.display = 'none'; // requestFullscreen unsupported on iOS Safari
    } else {
      const isFS  = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
      const enterFS = () => {
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen || (() => {})).call(el).catch(() => {});
      };
      const exitFS  = () => (document.exitFullscreen || document.webkitExitFullscreen || (() => {})).call(document);
      const toggleFS = () => isFS() ? exitFS() : enterFS();
      const updateIcon = () => { fsBtn.textContent = isFS() ? '⊠' : '⛶'; };
      document.addEventListener('fullscreenchange', updateIcon);
      document.addEventListener('webkitfullscreenchange', updateIcon);
      fsBtn.addEventListener('click', toggleFS);
      fsBtn.addEventListener('mouseover', () => { fsBtn.style.opacity = '0.85'; });
      fsBtn.addEventListener('mouseout',  () => { fsBtn.style.opacity = '0.45'; });
      // F key shortcut on desktop
      document.addEventListener('keydown', e => { if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.metaKey) toggleFS(); });
      // Auto-fullscreen when phone tilts to landscape
      const tryLandscapeFS = () => setTimeout(() => { if (window.innerWidth > window.innerHeight && !isFS()) enterFS(); }, 150);
      window.addEventListener('orientationchange', tryLandscapeFS);
      screen.orientation?.addEventListener('change', tryLandscapeFS);
    }

    // ── Galaxy generation ─────────────────────────────────────────────────
    const isMobile = window.innerWidth < 768;
    const COUNT    = isMobile ? 3000 : 2500;
    const szScale  = isMobile ? 1.0 : 0.5;
    const BRANCHES = 3, SPIN = 1.8, RND_PWR = 3;

    const stars = [];
    for (let i = 0; i < COUNT; i++) {
      const halo = i < COUNT * 0.07;
      let x, y, z;

      if (halo) {
        const r     = 0.6 + Math.random() * 0.9;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        x = r * Math.sin(phi) * Math.cos(theta);
        y = r * Math.cos(phi) * 0.1;
        z = r * Math.sin(phi) * Math.sin(theta);
      } else {
        const r      = Math.pow(Math.random(), 0.55);
        const branch = (i % BRANCHES) / BRANCHES * Math.PI * 2;
        const spin   = r * SPIN * Math.PI;
        const rnd    = () => Math.pow(Math.random(), RND_PWR) * (Math.random() < 0.5 ? 1 : -1);
        x = Math.cos(branch + spin) * r + rnd() * r * 0.32;
        y = rnd() * 0.032;
        z = Math.sin(branch + spin) * r + rnd() * r * 0.32;
      }

      const t = Math.min(Math.sqrt(x*x + z*z), 1);

      // Galaxy-realistic colours: warm orange core → white → blue arms → deep blue outer
      let cr, cg, cb;
      if (t < 0.12) {
        cr = 1.0; cg = 0.82 + Math.random() * 0.1; cb = 0.38 + Math.random() * 0.18;
      } else if (t < 0.32) {
        const f = (t - 0.12) / 0.20;
        cr = 1.0; cg = 0.82 + (1.0 - 0.82) * f; cb = 0.38 + (1.0 - 0.38) * f;
      } else if (t < 0.65) {
        cr = 0.62 + Math.random() * 0.28; cg = 0.72 + Math.random() * 0.22; cb = 1.0;
      } else {
        cr = 0.28 + Math.random() * 0.22; cg = 0.38 + Math.random() * 0.22; cb = 0.80 + Math.random() * 0.18;
      }
      if (halo) { cr *= 0.6; cg *= 0.6; cb *= 0.6; }

      const dim = halo ? (0.18 + Math.random() * 0.25) : (0.28 + Math.random() * 0.58);
      const sz  = szScale * (halo
        ? (0.0006 + Math.random() * 0.0012)
        : (0.0004 + Math.random() * 0.0018) * (1 - t * 0.35));
      const glitFactor  = Math.pow(Math.random(), 2.5);
      const twinkPhase  = Math.random() * Math.PI * 2;
      const twinkSpeed  = 2.0 + Math.random() * 5.0;
      stars.push({ x, y, z, cr, cg, cb, dim, sz, glitFactor, twinkPhase, twinkSpeed });
    }

    // Pick 2 special stars within r < 1/3 of centre
    const specialStars = [];
    {
      const pool = stars.filter(s => Math.sqrt(s.x*s.x + s.z*s.z) < 0.33);
      let a = pool[Math.floor(Math.random() * pool.length)];
      let b, tries = 0;
      do { b = pool[Math.floor(Math.random() * pool.length)]; }
      while ((b === a || Math.hypot(b.x - a.x, b.z - a.z) < 0.08) && ++tries < 300);
      [a, b].forEach(s => {
        s.special = true; s.specialAlive = true;
        s.sz  = Math.max(s.sz * 2, 0.0015 / szScale);
        s.dim = 0.9;
        s.cr = 1.0; s.cg = 0.92; s.cb = 0.62;
      });
      specialStars.push(
        { s: a, hitBy: null, killedById: null, savedSz: a.sz, savedDim: a.dim },
        { s: b, hitBy: null, killedById: null, savedSz: b.sz, savedDim: b.dim }
      );
      a.sz = 0; a.dim = 0; b.sz = 0; b.dim = 0;
    }

    function rebuildSpecialStars(n) {
      for (const sp of specialStars) {
        sp.s.special = false; sp.s.specialAlive = false;
        sp.s.sz = sp.savedSz; sp.s.dim = sp.savedDim;
      }
      specialStars.length = 0;
      const pool = stars.filter(s => !s.special);
      for (let i = 0; i < n; i++) {
        if (!pool.length) break;
        const j = Math.floor(Math.random() * pool.length);
        const s = pool.splice(j, 1)[0];
        s.special = true; s.specialAlive = true;
        s.sz = Math.max(s.sz * 2, 0.0015 / szScale);
        s.dim = 0.9; s.cr = 1.0; s.cg = 0.92; s.cb = 0.62;
        specialStars.push({ s, hitBy: null, killedById: null, savedSz: s.sz, savedDim: s.dim });
        s.sz = 0; s.dim = 0;
      }
    }

    // ── Interaction state ─────────────────────────────────────────────────
    let msx = -9999, msy = -9999;
    let dragging = false, ldx = 0, ldy = 0;
    let lDragging = false, mDragging = false, hintDragging = false;
    const heroEls = document.querySelectorAll('.hero h1, .hero p');
    let heroFaded = false;
    let dragRX = 0.28, dragRY = 0;
    let rotX = 0.28, rotY = 0, autoY = 0, last = 0;
    let camOX = 0, camOY = 0, camOZ = 0, camFollowT = 1, camZ = 1.4;

    // ── Mouse trail ───────────────────────────────────────────────────────
    const TRAIL = 16;
    const trailX = new Float32Array(TRAIL);
    const trailY = new Float32Array(TRAIL);
    const trailT = new Float32Array(TRAIL);
    let trailHead = 0, lastSample = 0;

    window.addEventListener('mousedown', e => {
      if (e.button === 0) {
        if (followGhost) {
          beginControl(followGhost, e.clientX, e.clientY);
          ldx = e.clientX; ldy = e.clientY;
        } else {
          lDragging = true;
          ssBegin(e.clientX, e.clientY);
        }
        e.preventDefault();
      } else if (e.button === 1) {
        mDragging = true;
        ldx = e.clientX; ldy = e.clientY;
        e.preventDefault();
      }
    });
    window.addEventListener('mouseup', e => {
      if (e.button === 0) {
        if (followGhost && followGhost.controlled) {
          followGhost.controlled = false;
        } else if (lDragging) {
          lDragging = false;
          ssEnd();
        }
      } else if (e.button === 1) {
        mDragging = false;
      }
    });
    window.addEventListener('mousemove', e => {
      msx = e.clientX; msy = e.clientY;
      if (mDragging) {
        dragRY += (e.clientX - ldx) / window.innerWidth  * Math.PI * 1.8;
        dragRX += (e.clientY - ldy) / window.innerHeight * Math.PI * 0.8;
        dragRX  = Math.max(-0.9, Math.min(0.9, dragRX));
        ldx = e.clientX; ldy = e.clientY;
      } else if (followGhost && followGhost.controlled) {
        steerGhost(followGhost, e.clientX - followGhost._ctrlStartX, e.clientY - followGhost._ctrlStartY);
        ldx = e.clientX; ldy = e.clientY;
      } else if (lDragging) {
        ssLX = e.clientX; ssLY = e.clientY;
      }
    });
    window.addEventListener('mouseleave', () => { msx = -9999; msy = -9999; lDragging = false; mDragging = false; });

    // ── Shooting stars (3D, mobile swipe) ────────────────────────────────
    const SS_MAX     = 3;
    const SS_GRAVITY = 0.10;   // weaker; 1/r falloff keeps arcs gradual
    const SS_SOFTEN  = 0.008;
    const SS_LIFE_MS = 12000;
    const SS_TRAIL   = isMobile ? 80 : 30;
    const shootingStars = [];
    const starPairs = [];
    const pairGhosts = [];
    let ssLX = 0, ssLY = 0, ssStartX = 0, ssStartY = 0, ssStartT = 0, ssPending = null;
    let ssIdCounter = 0;
    let heartPhase = 0, heartT = 0, rotMult = 1, heartRot = 0, heartStartRotX = 0.28;
    let heartCount = 0, heartMsgSet = null;
    let proposalMode = false, engagedMode = new URLSearchParams(location.search).has('e'), followStar = null, followGhost = null;
    const HEART_MSGS = [
      { form: ['> ♥ dark matter. can\'t see it, but i feel the pull.', '>'],
        restore: ['> a pull you can\'t resist.', '> ✦ drag one into it.', '>'] },
      { form: ['> ♥ ×2. you\'ve got me in a spin. technically that\'s a rotation.', '>'],
        restore: ['> twice the pull.', '> ✦ resistance is futile, apparently.', '>'] },
      { form: ['> ♥ ×3. light from your first visit is still travelling.', '>'],
        restore: ['> three times. that\'s not coincidence, that\'s physics.', '> ✦ come find me again.', '>'] }
    ];
    function getHeartMsgs(n) {
      if (n <= HEART_MSGS.length) return HEART_MSGS[n - 1];
      if (n === 4) return {
        form: ['> ♥ ×4.', '> escape velocity. achieved.', '> will you be my co-star?', '>'],
        restore: ['> the universe says yes.', '> engaged mode: activated.', '> ✦ ten ✦ now. same pull. bigger sky.', '>'],
        isProposal: true
      };
      return { form: ['> ♥ ×' + n + '. still in orbit.', '>'], restore: ['> ' + n + ' hearts. the pull is mutual.', '> ✦ you know where to find me.', '>'] };
    }
    const HEART_FORM = 4000, HEART_HOLD = 5000, HEART_RETURN = 4000;

    // Unproject screen tap → world XZ plane (Y≈0, galaxy plane)
    function ssUnproject(sx, sy) {
      const W = canvas.width, H = canvas.height;
      const gcx = W * 0.5, gcy = H * 0.5;
      const fov = Math.max(W, H) * 1.6;
      const sX = Math.sin(rotX), cX = Math.cos(rotX);
      const sY = Math.sin(rotY), cY = Math.cos(rotY);
      const D = sy - gcy;
      const denom = sX * fov + D * cX;
      if (Math.abs(denom) < 1e-4) return null;
      const z1 = -D * camZ / denom;
      const dz = camZ + z1 * cX;
      if (dz < 0.05) return null;
      const x1 = (sx - gcx) * dz / fov;
      return { X: x1 * cY - z1 * sY + camOX, Y: camOY, Z: x1 * sY + z1 * cY + camOZ, dz };
    }

    // Jacobian-inverse: convert screen-space velocity → 3D world velocity on XZ plane
    function ss3DVel(vsx, vsy, dz) {
      const fov = Math.max(canvas.width, canvas.height) * 1.6;
      const sX = Math.sin(rotX);
      const sY = Math.sin(rotY), cY = Math.cos(rotY);
      const k = dz / fov;
      const sXs = Math.abs(sX) < 0.06 ? (sX < 0 ? -0.06 : 0.06) : sX;
      return { vX: k * (cY * vsx + sY / sXs * vsy), vY: 0, vZ: k * (sY * vsx - cY / sXs * vsy) };
    }

    function ssSpawn(sx, sy, vsx, vsy) {
      const pos = ssUnproject(sx, sy);
      if (!pos) return;
      const v = ss3DVel(vsx, vsy, pos.dz);

      if (engagedMode) {
        // Only one pair at a time
        if (pairGhosts.length > 0) return;
        // Strip outward radial component, then fix to a constant speed —
        // direction comes from the swipe, magnitude is always the same
        const r2 = Math.sqrt(pos.X*pos.X + pos.Z*pos.Z);
        if (r2 > 0.01) {
          const radX = pos.X / r2, radZ = pos.Z / r2;
          const radDot = v.vX * radX + v.vZ * radZ;
          if (radDot > 0) { v.vX -= radDot * radX; v.vZ -= radDot * radZ; }
        }
        const PAIR_SPEED = 0.025;
        const spd = Math.sqrt(v.vX*v.vX + v.vZ*v.vZ);
        if (spd > 0.001) { const sc = PAIR_SPEED / spd; v.vX *= sc; v.vZ *= sc; }
        else { v.vX = PAIR_SPEED; v.vZ = 0; }
        v.vY = 0;
        const ghost = { X: pos.X, Y: pos.Y, Z: pos.Z, vX: v.vX, vY: v.vY, vZ: v.vZ,
                        life: 1, t: 0, angle: 0, controlled: false, lastSc: 1,
                        followStarted: false, _ctrlTime: 0, trail1: [], trail2: [] };
        pairGhosts.push(ghost);
        // Camera follow starts after a 2s pause then a 5s lerp-in (camFollowT from 0)
        if (!ssSpawn.hinted && window.cLog) {
          ssSpawn.hinted = true;
          setTimeout(() => { window.cLog('> two in one shot. the ring awaits.'); }, 1500);
        }
        return;
      }

      if (shootingStars.filter(s => !s.mini).length >= SS_MAX) {
        const oldest = shootingStars.find(s => !s.mini);
        if (oldest) oldest.dying = true;
      }
      shootingStars.push({ id: ssIdCounter++, mini: false, X: pos.X, Y: pos.Y, Z: pos.Z, vX: v.vX, vY: v.vY, vZ: v.vZ, life: 1, trail: [], dying: false });
      if (window.cLogShot) window.cLogShot(ssIdCounter - 1);
      if (!ssSpawn.hinted && window.cLog) {
        ssSpawn.hinted = true;
        setTimeout(() => { window.cLog('> two special ✦ hidden in the galaxy.'); window.cLog('> aim for the stars. no, literally.'); }, 1500);
      }
    }

    function ssBegin(x, y) {
      ssStartX = ssLX = x;
      ssStartY = ssLY = y;
      ssStartT = performance.now();
    }
    function ssEnd() {
      const dx = ssLX - ssStartX, dy = ssLY - ssStartY;
      if (dx*dx + dy*dy < 144) return; // ignore taps under 12px
      const dt = Math.max(50, performance.now() - ssStartT);
      let vsx = dx / dt * 1000, vsy = dy / dt * 1000;
      const spd = Math.sqrt(vsx*vsx + vsy*vsy);
      if (spd < 80) { const f = 80 / Math.max(spd, 1); vsx *= f; vsy *= f; }
      clearTimeout(ssPending);
      ssSpawn(ssLX, ssLY, vsx, vsy);
    }

    function spawnFireworks() {
      // Muted galaxy tones — readable in source-over without blowing out
      const palette = ['#fffee8','#ffe8b0','#ffd080','#f0d0a8','#e0eaff','#c8d8ff','#f4f0ff','#fff0d8'];
      // Burst origins scattered at ring scale (~0.038 world units from centre)
      const bursts = [
        { X:  0.038, Z:  0.000 }, { X:  0.019, Z:  0.033 },
        { X: -0.019, Z:  0.033 }, { X: -0.038, Z:  0.000 },
        { X: -0.019, Z: -0.033 }, { X:  0.019, Z: -0.033 }
      ];
      for (const b of bursts) {
        for (let i = 0; i < 18; i++) {
          const phi = Math.acos(2 * Math.random() - 1);
          const th  = Math.random() * Math.PI * 2;
          const spd = 0.12 + Math.random() * 0.15; // 3× faster — drag spreads them wide
          shootingStars.push({
            id: ssIdCounter++, mini: true, firework: true,
            fireworkColor: palette[Math.floor(Math.random() * palette.length)],
            X: b.X, Y: 0, Z: b.Z,
            vX: spd * Math.sin(phi) * Math.cos(th),
            vY: spd * Math.sin(phi) * Math.sin(th) * 0.15,
            vZ: spd * Math.cos(phi),
            life: 1.0, trail: [], dying: false,
            fwAge: 0, fwTang: Math.random() < 0.5 ? 1 : -1
          });
        }
      }
    }

    function spawnMiniStars(wx, wy, wz, count) {
      count = count || 10;
      for (let i = 0; i < count; i++) {
        const phi = Math.acos(2 * Math.random() - 1);
        const th  = Math.random() * Math.PI * 2;
        const spd = 0.04 + Math.random() * 0.08;
        shootingStars.push({
          id: ssIdCounter++, mini: true,
          X: wx, Y: wy, Z: wz,
          vX: spd * Math.sin(phi) * Math.cos(th),
          vY: spd * Math.sin(phi) * Math.sin(th),
          vZ: spd * Math.cos(phi),
          life: 0.85, trail: [], dying: false
        });
      }
    }
    // ── Engaged mode atmospheric music ──────────────────────────────────────
    let _mus = null, _musRise = 0;

    function startEngagedMusic() {
      if (_mus) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended')
          document.addEventListener('pointerdown', () => ctx.resume(), { once: true });

        // Pause/resume with tab visibility
        const _visHandler = () => document.hidden ? ctx.suspend() : ctx.resume();
        document.addEventListener('visibilitychange', _visHandler);

        // Bright, airy reverb (3 s)
        const irLen = Math.floor(ctx.sampleRate * 3.0);
        const ir = ctx.createBuffer(2, irLen, ctx.sampleRate);
        for (let c = 0; c < 2; c++) {
          const d = ir.getChannelData(c);
          for (let i = 0; i < irLen; i++)
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 1.4);
        }
        const rev = ctx.createConvolver(); rev.buffer = ir;

        // Master → gentle high-shelf (+2 dB air) → out
        const master = ctx.createGain(); master.gain.value = 0;
        master.gain.linearRampToValueAtTime(0.20, ctx.currentTime + 6);
        const shelf = ctx.createBiquadFilter();
        shelf.type = 'highshelf'; shelf.frequency.value = 2200; shelf.gain.value = 2;
        master.connect(shelf); shelf.connect(ctx.destination);

        // Breath swell ±0.05 every ~12 s
        const swellOsc = ctx.createOscillator();
        const swellAmt = ctx.createGain();
        swellOsc.frequency.value = 0.083; swellAmt.gain.value = 0.05;
        swellOsc.connect(swellAmt); swellAmt.connect(master.gain);
        swellOsc.start();

        const bus = ctx.createGain();
        const dry = ctx.createGain(); dry.gain.value = 0.55;
        const wet = ctx.createGain(); wet.gain.value = 0.48;
        bus.connect(dry); bus.connect(rev);
        rev.connect(wet); dry.connect(master); wet.connect(master);

        const melBus = ctx.createGain(); melBus.gain.value = 0.80;
        melBus.connect(bus);
        const arpBus = ctx.createGain(); arpBus.gain.value = 0.55;
        arpBus.connect(bus);

        // String pad: sine + triangle dominant, tiny saw for warmth, deep vibrato
        function mkPad(freq, dest, vol, atk) {
          vol = vol || 0.15; atk = atk || 2.5;
          const gate = ctx.createGain();
          gate.gain.setValueAtTime(0, ctx.currentTime);
          gate.gain.linearRampToValueAtTime(vol, ctx.currentTime + atk);
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass'; lp.frequency.value = 2200; lp.Q.value = 0.4;
          lp.connect(gate); gate.connect(dest);
          const vs = [];
          if (isMobile) {
            // 2 oscillators only, no LFOs — keeps node count low on mobile
            for (const [type, g] of [['sine', 0.60], ['triangle', 0.40]]) {
              const o = ctx.createOscillator(), og = ctx.createGain();
              o.type = type; o.frequency.value = freq; og.gain.value = g;
              o.connect(og); og.connect(lp); o.start(); vs.push(o);
            }
          } else {
            for (const [det, type, g] of [
              [0,'sine',0.35],[0,'triangle',0.38],[12,'triangle',0.15],[-12,'triangle',0.15],[0,'sawtooth',0.07]
            ]) {
              const o = ctx.createOscillator(), lfo = ctx.createOscillator();
              const lfog = ctx.createGain(), og = ctx.createGain();
              o.type = type; o.frequency.value = freq; o.detune.value = det;
              lfo.frequency.value = 5.0 + Math.random() * 0.8;
              lfog.gain.value = 7 + Math.random() * 4;
              og.gain.value = g;
              lfo.connect(lfog); lfog.connect(o.detune);
              o.connect(og); og.connect(lp);
              o.start(); lfo.start(); vs.push(o, lfo);
            }
          }
          const relT = isMobile ? 2.0 : 2.5;
          return { rel(t) {
            t = t || relT;
            gate.gain.setTargetAtTime(0, ctx.currentTime, t / 3);
            setTimeout(() => vs.forEach(v => { try { v.stop(); } catch(e) {} }), t * 1000 + 300);
          }};
        }

        // Harp pluck: instant attack, exponential decay, tiny pitch-settle for realism
        function mkPluck(freq, dest, vol) {
          const g = ctx.createGain();
          g.gain.setValueAtTime(vol || 0.16, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.2);
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass'; lp.frequency.value = 5000; lp.Q.value = 0.7;
          const o = ctx.createOscillator();
          o.type = 'triangle'; o.frequency.value = freq;
          o.frequency.setValueAtTime(freq * 1.007, ctx.currentTime);
          o.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime + 0.05);
          o.connect(lp); lp.connect(g); g.connect(dest);
          o.start();
          setTimeout(() => { try { o.stop(); } catch(e) {} }, 2600);
        }

        // G major — all major / suspended chords, no minor, 12 s each
        const chords = [
          [97.999, 196.00, 246.94, 293.66, 369.99, 440.00], // Gmaj9: G2 G3 B3 D4 F#4 A4
          [130.81, 196.00, 261.63, 293.66, 329.63, 392.00], // Cadd9: C3 G3 C4 D4 E4 G4
          [146.83, 220.00, 293.66, 369.99, 440.00],          // D:    D3 A3 D4 F#4 A4
          [110.00, 220.00, 293.66, 329.63, 440.00],          // Asus2: A2 A3 D4 E4 A4
        ];
        const arpNotes = [               // sparkle notes for each chord (higher octave)
          [392.00, 493.88, 587.33, 739.99],  // G4 B4 D5 F#5
          [261.63, 329.63, 392.00, 587.33],  // C4 E4 G4 D5
          [293.66, 369.99, 440.00, 587.33],  // D4 F#4 A4 D5
          [220.00, 293.66, 329.63, 440.00],  // A3 D4 E4 A4
        ];
        // Mobile chords: 3 notes only (root, fifth, third) to cut oscillator count
        const mobileChords = [
          [97.999, 293.66, 369.99],   // Gmaj9 root: G2 D4 F#4
          [130.81, 261.63, 392.00],   // Cadd9 root: C3 C4 G4
          [146.83, 293.66, 440.00],   // D root:     D3 D4 A4
          [110.00, 220.00, 329.63],   // Asus2 root: A2 A3 E4
        ];
        let ci = 0, cn = [];
        function setChord(i) {
          const xfade = isMobile ? 2.0 : 3.5;
          cn.forEach(n => n.rel(xfade)); cn = [];
          const notes = isMobile ? mobileChords[i] : chords[i];
          notes.forEach((f, k) => setTimeout(() => {
            if (!_mus) return;
            cn.push(mkPad(f, bus, k === 0 ? 0.15 : 0.11, isMobile ? 1.8 : 2.5 + k * 0.35));
          }, k * (isMobile ? 250 : 380)));
        }
        setChord(0);
        const cTimer = setInterval(() => {
          if (!_mus) { clearInterval(cTimer); return; }
          ci = (ci + 1) % chords.length; setChord(ci);
        }, 12000);

        // Harp sparkle: slow upward arpeggio every 3-6 s
        function scheduleArp() {
          if (!_mus) return;
          arpNotes[ci].forEach((f, i) => setTimeout(() => {
            if (_mus) mkPluck(f, arpBus, 0.17 - i * 0.02);
          }, i * 340));
          setTimeout(scheduleArp, 3200 + Math.random() * 3000);
        }
        if (!isMobile) setTimeout(scheduleArp, 2200);

        // Melody: G pentatonic lower register — caps at D5 to avoid whistling
        const scale = [392.00, 440.00, 493.88, 587.33];
        //              G4      A4      B4      D5
        let mi = 1, mn = null, mTimer = null;
        function nextMel() {
          // Release time shorter at higher notes so they don't linger
          if (mn) { mn.rel(mi < 2 ? 1.6 : 0.7); } mn = null;
          const bias = _musRise > 0.006 ? 1 : _musRise < -0.006 ? -1 : 0;
          // Gravity back toward B4 (index 2) when above it — prevents dwelling up high
          const grav = mi >= 2 ? -1 : 0;
          const r = Math.random();
          const leap = r < 0.12 ? 2 : 1;  // mostly steps
          mi = Math.max(0, Math.min(scale.length - 1,
            mi + (bias + grav + (r < 0.48 ? 1 : -1)) * leap));
          const hiF = mi / (scale.length - 1);
          const vol = 0.22 - hiF * 0.08;          // 0.22 → 0.14
          const dur = 900 + Math.random() * 1100 - hiF * 500;  // 900-2000ms low, 400-1500ms high
          mn = mkPad(scale[mi], melBus, vol, 0.5);
          mTimer = setTimeout(() => { if (_mus) nextMel(); }, dur);
        }
        setTimeout(() => { if (_mus) nextMel(); }, 3200);

        _mus = { ctx, shelf, swellOsc, cTimer, mTimer,
          stop() {
            clearInterval(this.cTimer); clearTimeout(this.mTimer);
            document.removeEventListener('visibilitychange', _visHandler);
            try { this.swellOsc.stop(); } catch(e) {}
            master.gain.setTargetAtTime(0, this.ctx.currentTime, 3.5);
            setTimeout(() => { try { this.ctx.close(); } catch(e) {} }, 12000);
            _mus = null;
          }
        };
      } catch(e) { /* audio unavailable */ }
    }
    // ────────────────────────────────────────────────────────────────────────

    function triggerHeart() {
      if (heartPhase !== 0) return;
      const spread = Math.min(canvas.width, canvas.height) * 0.16;
      heartRot = 0;
      for (const s of stars) {
        s.heartOffAng  = Math.random() * Math.PI * 2;
        s.heartBloomR  = 1.5 + Math.pow(Math.random(), 0.5) * 10;  // range ~1.5–11.5, skewed long
        if (Math.random() < 0.03) {
          s.heartOffR  = 0;
          s.heartPull  = 1;
        } else {
          s.heartOffR  = Math.pow(Math.random(), 2) * spread;
          s.heartPull  = 1 - s.heartOffR / spread;
        }
      }
      heartStartRotX = dragRX;
      for (const s of shootingStars) { if (s.mini) s.life = 1; }
      heartPhase = 1; heartT = 0;
      heartCount++;
      proposalMode = heartCount === 4;
      heartMsgSet = getHeartMsgs(heartCount);
      if (window.cLogHeart) window.cLogHeart(heartCount);
    }

    window.cheatEngage = function() {
      if (engagedMode || heartPhase !== 0) return;
      heartCount = 3;
      triggerHeart();
      if (window.cLogInstant) window.cLogInstant('> ♥ ×4');
    };
    if (new URLSearchParams(location.search).get('e') !== null) setTimeout(() => { window.cheatEngage(); if (window.cLogInstant) window.cLogInstant('> ?e loaded'); }, 200);

    window.pairState = function() {
      const p = starPairs[0];
      return { eng: engagedMode, pairs: starPairs.length, ss: shootingStars.filter(s=>!s.mini).length,
        s1: p?.s1 ? [p.s1.X.toFixed(2), p.s1.Y.toFixed(2), p.s1.Z.toFixed(2)] : null,
        s2: p?.s2 ? [p.s2.X.toFixed(2), p.s2.Y.toFixed(2), p.s2.Z.toFixed(2)] : null,
        ghost: p?.ghost ? [p.ghost.X.toFixed(2), p.ghost.Y.toFixed(2), p.ghost.Z.toFixed(2)] : null,
        fG: !!followGhost, pT: p?.pairTime?.toFixed(1) };
    };

    window.camState = function() {
      return { engagedMode, followStar: followStar ? { X: followStar.X, Y: followStar.Y, Z: followStar.Z, life: followStar.life } : null, camOX, camOY, camOZ };
    };

    function ssDraw(dt, sinX, cosX, sinY, cosY) {
      const W = canvas.width, H = canvas.height;
      const gcx = W * 0.5, gcy = H * 0.5;
      const fov = Math.max(W, H) * 1.6;
      const dts = dt * 0.001;

      function proj3(X, Y, Z) {
        const rx = X - camOX, ry = Y - camOY, rz = Z - camOZ;
        const x1 =  rx * cosY + rz * sinY;
        const z1 = -rx * sinY + rz * cosY;
        const y2 =  ry * cosX - z1 * sinX;
        const z2 =  ry * sinX + z1 * cosX;
        const dz = camZ + z2;
        if (dz < 0.01) return null;
        const sc = fov / dz;
        return { sx: x1 * sc + gcx, sy: y2 * sc + gcy, sc };
      }

      // Unproject a screen point to the Y=0 world plane (same logic as ssUnproject)
      function unprojectHeart(scx, scy) {
        const D = scy - gcy;
        const denom = sinX * fov + D * cosX;
        if (Math.abs(denom) < 1e-4) return null;
        const z1 = -D * camZ / denom;
        const dz = camZ + z1 * cosX;
        if (dz < 0.05) return null;
        const x1 = (scx - gcx) * dz / fov;
        return { X: x1 * cosY - z1 * sinY, Y: 0, Z: x1 * sinY + z1 * cosY };
      }

      // Precompute heart curve sample points in 3D world space for this frame's camera
      let heartTargets = null;
      if (heartPhase > 0) {
        const hs = Math.min(W, H) * 0.018;
        heartTargets = [];
        for (let k = 0; k < 64; k++) {
          const th = (k / 64) * Math.PI * 2;
          const hx = proposalMode ? Math.cos(th) * 16 : 16 * Math.pow(Math.sin(th), 3);
          const hy = proposalMode ? Math.sin(th) * 16 : -(13*Math.cos(th) - 5*Math.cos(2*th) - 2*Math.cos(3*th) - Math.cos(4*th));
          const pt = unprojectHeart(gcx + hx * hs, gcy + hy * hs);
          if (pt) heartTargets.push(pt);
        }
      }

      const ssR   = (isMobile ? 1 : 0.7) * Math.max(2.5, Math.max(W, H) * 0.003);
      const hitR2 = Math.pow(Math.max(22, ssR * 6), 2);

      // Pair physics — ghost moves freely under gravity; stars spring around it
      for (let pi = starPairs.length - 1; pi >= 0; pi--) {
        const pair = starPairs[pi];
        const h1 = shootingStars.includes(pair.s1), h2 = shootingStars.includes(pair.s2);
        if (!h1 && !h2) { if (followGhost === pair.ghost) followGhost = null; starPairs.splice(pi, 1); continue; }
        if (!h1 || !h2) continue;
        const g = pair.ghost;
        const gr2 = g.X*g.X + g.Y*g.Y + g.Z*g.Z + SS_SOFTEN;
        const gr = Math.sqrt(gr2);
        const ga = SS_GRAVITY * 0.15 / gr;
        g.vX -= ga * g.X / gr * dts; g.vY -= ga * g.Y / gr * dts; g.vZ -= ga * g.Z / gr * dts;
        g.X += g.vX * dts; g.Y += g.vY * dts; g.Z += g.vZ * dts;
        pair.pairTime = (pair.pairTime || 0) + dts;
        const pulseR = pair.r * (0.5 + 0.5 * Math.abs(Math.cos(Math.PI * pair.pairTime)));
        pair.angle += pair.rotSpeed * dts;
        const { s1, s2, angle, p1X, p1Z } = pair;
        const ca = Math.cos(angle), sa = Math.sin(angle);
        const offX = p1X * ca * pulseR, offY = sa * pulseR, offZ = p1Z * ca * pulseR;
        const k = 160 * dts;
        s1.vX += ((g.X + offX) - s1.X) * k; s1.vY += ((g.Y + offY) - s1.Y) * k; s1.vZ += ((g.Z + offZ) - s1.Z) * k;
        s2.vX += ((g.X - offX) - s2.X) * k; s2.vY += ((g.Y - offY) - s2.Y) * k; s2.vZ += ((g.Z - offZ) - s2.Z) * k;
      }

      ctx.globalCompositeOperation = 'lighter';
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        const HT = heartTargets;
        if (s.mini && !s.firework && heartPhase > 0 && HT && HT.length > 0) {
          // Mini stars orbit the heart curve
          let bestD2 = Infinity, bestIdx = 0;
          for (let k = 0; k < HT.length; k++) {
            const ht = HT[k];
            const ex = s.X - ht.X, ey = s.Y - ht.Y, ez = s.Z - ht.Z;
            const d2 = ex*ex + ey*ey + ez*ez;
            if (d2 < bestD2) { bestD2 = d2; bestIdx = k; }
          }
          const N = HT.length, htC = HT[bestIdx];
          const nxt = HT[(bestIdx + 1) % N], prv = HT[(bestIdx - 1 + N) % N];
          const tx = nxt.X - prv.X, ty = nxt.Y - prv.Y, tz = nxt.Z - prv.Z;
          const tLen = Math.sqrt(tx*tx + ty*ty + tz*tz) + 1e-8;
          if (!s.orbitDir) {
            const dot = s.vX*tx + s.vY*ty + s.vZ*tz;
            s.orbitDir = dot < 0 ? -1 : 1;
            s.orbitSpd = 0.05 + Math.random() * 0.05;
          }
          const spd = s.orbitSpd;
          s.vX += (s.orbitDir * spd * tx/tLen - s.vX) * 0.06;
          s.vY += (s.orbitDir * spd * ty/tLen - s.vY) * 0.06;
          s.vZ += (s.orbitDir * spd * tz/tLen - s.vZ) * 0.06;
          const snapStr = heartPhase === 3 ? (1 - heartT) * 0.03 : 0.03;
          s.X += (htC.X - s.X) * snapStr;
          s.Y += (htC.Y - s.Y) * snapStr;
          s.Z += (htC.Z - s.Z) * snapStr;
          if (heartPhase === 3) {
            const rXZ = Math.sqrt(s.X*s.X + s.Z*s.Z);
            if (rXZ > 0.01) {
              const tgX = -s.Z / rXZ, tgZ = s.X / rXZ;
              const jitter = 0.2 + ((s.orbitSpd - 0.05) / 0.05) * 0.3;
              const orbV = Math.sqrt(SS_GRAVITY / rXZ) * jitter;
              const dir = (s.vX * tgX + s.vZ * tgZ) >= 0 ? 1 : -1;
              s.vX += (dir * tgX * orbV - s.vX) * heartT * heartT * 0.1;
              s.vZ += (dir * tgZ * orbV - s.vZ) * heartT * heartT * 0.1;
            }
          }
        } else if (!s.mini && heartPhase > 0 && HT && HT.length > 0 && !(s.trailNear && engagedMode)) {
          // Non-mini shooting stars pulled toward heart curve during heart phases
          let bestD2 = Infinity, bX = 0, bY = 0, bZ = 0;
          for (const ht of HT) {
            const ex = s.X - ht.X, ey = s.Y - ht.Y, ez = s.Z - ht.Z;
            const d2 = ex*ex + ey*ey + ez*ez;
            if (d2 < bestD2) { bestD2 = d2; bX = ht.X; bY = ht.Y; bZ = ht.Z; }
          }
          const ex = s.X - bX, ey = s.Y - bY, ez = s.Z - bZ;
          const r = Math.sqrt(bestD2 + SS_SOFTEN);
          const a = SS_GRAVITY / r;
          s.vX -= a * ex / r * dts;
          s.vY -= a * ey / r * dts;
          s.vZ -= a * ez / r * dts;
        } else if (s.firework) {
          s.fwAge += dts;
          // Exponential drag for first 4s — fast burst decelerates across screen
          if (s.fwAge < 4) { const df = 1 - 0.7 * dts; s.vX *= df; s.vY *= df; s.vZ *= df; }
          // Ring suck + ring-tangent steering: t=1.5→5s
          const ringT = Math.max(0, Math.min(1, (s.fwAge - 1.5) / 3.5));
          if (ringT > 0 && heartTargets && heartTargets.length > 0) {
            // Find nearest ring point AND its index so we can compute the ring tangent
            let bestD2 = Infinity, bestIdx = 0;
            for (let hi = 0; hi < heartTargets.length; hi++) {
              const ht = heartTargets[hi];
              const ex = s.X - ht.X, ey = s.Y - ht.Y, ez = s.Z - ht.Z;
              const d2 = ex*ex + ey*ey + ez*ez;
              if (d2 < bestD2) { bestD2 = d2; bestIdx = hi; }
            }
            const bX = heartTargets[bestIdx].X, bY = heartTargets[bestIdx].Y, bZ = heartTargets[bestIdx].Z;
            const rx = bX - s.X, ry = bY - s.Y, rz = bZ - s.Z;
            const rDist = Math.sqrt(bestD2) + 1e-8;
            // Pull toward ring
            const pullStr = ringT * ringT * rDist * 14;
            s.vX += rx / rDist * pullStr * dts;
            s.vY += ry / rDist * pullStr * dts;
            s.vZ += rz / rDist * pullStr * dts;
            // Steer tangentially along the ring curve (not around global origin)
            const n = heartTargets.length;
            const tgA = heartTargets[(bestIdx + 3) % n];
            const tgB = heartTargets[(bestIdx - 3 + n) % n];
            let tX = tgA.X - tgB.X, tY = tgA.Y - tgB.Y, tZ = tgA.Z - tgB.Z;
            const tLen = Math.sqrt(tX*tX + tY*tY + tZ*tZ) + 1e-8;
            tX = tX / tLen * (s.fwTang || 1);
            tY = tY / tLen * (s.fwTang || 1);
            tZ = tZ / tLen * (s.fwTang || 1);
            const curTang = s.vX*tX + s.vY*tY + s.vZ*tZ;
            const wantTang = 0.120;
            // Steering ramps up with ringT so particles smoothly transition to orbit
            s.vX += tX * (wantTang - curTang) * ringT * 4.0 * dts;
            s.vY += tY * (wantTang - curTang) * ringT * 4.0 * dts;
            s.vZ += tZ * (wantTang - curTang) * ringT * 4.0 * dts;
            // Strip radial component — velocity becomes fully parallel to ring on contact
            const radVel = s.vX*(rx/rDist) + s.vY*(ry/rDist) + s.vZ*(rz/rDist);
            const strip = Math.max(0, 1 - rDist / 0.06);  // ramps 0→1 as particle closes in
            s.vX -= rx / rDist * radVel * strip;
            s.vY -= ry / rDist * radVel * strip;
            s.vZ -= rz / rDist * radVel * strip;
          } else {
            if (s.fwAge < 1.5) {
              // Pre-ring: gentle spin around origin so burst isn't just outward
              const rXZ = Math.sqrt(s.X*s.X + s.Z*s.Z) + 1e-8;
              const tX = -s.Z / rXZ * (s.fwTang || 1);
              const tZ =  s.X / rXZ * (s.fwTang || 1);
              const curTang = s.vX * tX + s.vZ * tZ;
              s.vX += tX * (0.120 - curTang) * 0.8 * dts;
              s.vZ += tZ * (0.120 - curTang) * 0.8 * dts;
            } else {
              // Ring gone mid-flight: bleed off velocity so particles fade in place
              const df = 1 - 1.8 * dts;
              s.vX *= df; s.vY *= df; s.vZ *= df;
            }
          }
        } else if (s.trailNear && engagedMode) {
          // Pair star — ghost handles orbital gravity; skip individual gravity
        } else {
          const r2 = s.X * s.X + s.Y * s.Y + s.Z * s.Z + SS_SOFTEN;
          const r  = Math.sqrt(r2);
          const a  = (engagedMode ? SS_GRAVITY * 0.15 : SS_GRAVITY) / r;
          s.vX -= a * s.X / r * dts;
          s.vY -= a * s.Y / r * dts;
          s.vZ -= a * s.Z / r * dts;
        }
        s.trail.push({ X: s.X, Y: s.Y, Z: s.Z });
        if (s.trail.length > SS_TRAIL) s.trail.shift();
        s.X += s.vX * dts; s.Y += s.vY * dts; s.Z += s.vZ * dts;
        if (s.firework) s.life -= dt * 0.8 / SS_LIFE_MS;
        else if (!s.mini || heartPhase === 0) s.life -= dt * (s.dying ? 4 : 1) / (SS_LIFE_MS * (engagedMode && !s.mini ? 12 : 1));
        if (s.life <= 0) {
          if (!s.firework && heartPhase === 0) {
            for (const sp of specialStars) {
              if (sp.killedById === s.id) {
                sp.s.specialAlive = true;
                sp.s.sz = 0; sp.s.dim = 0;
                sp.hitBy = null; sp.killedById = null;
              }
            }
          }
          if (followStar === s) followStar = null;
          shootingStars.splice(i, 1); continue;
        }
        const starR = s.mini ? ssR * 0.45 : ssR;
        const isLeadStar = !!s.isLeadStar && engagedMode;
        const isPairStar = !s.mini && !!s.trailNear && engagedMode;
        const ssWorldR = ssR * 1.4 / fov;
        const tl = s.trail.length;
        if (!isMobile && !isPairStar && tl > 1) {
          // Desktop: per-segment tapered line — thin dim tail → thick bright head
          ctx.lineCap = 'round';
          ctx.strokeStyle = s.firework ? s.fireworkColor : (s.trailNear || '#fff0a0');
          for (let j = 2; j < tl; j++) {
            const f = j / tl;
            const pa = proj3(s.trail[j-1].X, s.trail[j-1].Y, s.trail[j-1].Z);
            const pb = proj3(s.trail[j].X,   s.trail[j].Y,   s.trail[j].Z);
            if (!pa || !pb) continue;
            ctx.globalAlpha = f * f * s.life * 0.88;
            ctx.lineWidth   = f * starR * 1.6;
            ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();
          }
        } else {
          // Mobile (and pair stars): original dot trail
          if (s.firework) ctx.globalCompositeOperation = 'source-over';
          for (let j = 1; j < tl; j++) {
            const f = j / tl;
            const p = proj3(s.trail[j].X, s.trail[j].Y, s.trail[j].Z);
            if (!p) continue;
            ctx.globalAlpha = f * f * s.life * 0.9;
            ctx.fillStyle = s.firework ? s.fireworkColor : (f > 0.5 ? (s.trailNear || '#fff0a0') : (s.trailFar || '#ff8820'));
            const sz = isPairStar ? Math.max(ssWorldR * 0.4, f * ssWorldR) * p.sc : Math.max(starR * 0.4, f * starR);
            ctx.fillRect(p.sx - sz * 0.5, p.sy - sz * 0.5, sz, sz);
          }
          if (s.firework) ctx.globalCompositeOperation = 'lighter';
        }
        const head = proj3(s.X, s.Y, s.Z);
        if (head) {
          if (isLeadStar) {
            const glowR = Math.min(W, H) * 0.15;
            const grd = ctx.createRadialGradient(head.sx, head.sy, 0, head.sx, head.sy, glowR);
            grd.addColorStop(0,    'rgba(255,252,220,1)');
            grd.addColorStop(0.08, 'rgba(255,220,120,0.9)');
            grd.addColorStop(0.3,  'rgba(255,140,40,0.4)');
            grd.addColorStop(1,    'rgba(255,80,10,0)');
            ctx.globalAlpha = s.life;
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(head.sx, head.sy, glowR, 0, 6.2832); ctx.fill();
          } else if (isPairStar) {
            ctx.globalCompositeOperation = 'source-over';
            const glowR = Math.min(W, H) * 0.12;
            const grd = ctx.createRadialGradient(head.sx, head.sy, 0, head.sx, head.sy, glowR);
            grd.addColorStop(0,    'rgba(0,220,255,0.9)');
            grd.addColorStop(0.15, 'rgba(0,160,255,0.7)');
            grd.addColorStop(0.5,  'rgba(0,80,200,0.3)');
            grd.addColorStop(1,    'rgba(0,20,120,0)');
            ctx.globalAlpha = s.life;
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(head.sx, head.sy, glowR, 0, 6.2832); ctx.fill();
            ctx.globalCompositeOperation = 'lighter';
          }
          if (s.mini && (heartPhase > 0 || s.firework)) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = s.life * 0.95;
            ctx.fillStyle = s.firework ? s.fireworkColor : '#ff4488';
            ctx.beginPath(); ctx.arc(head.sx, head.sy, starR, 0, 6.2832); ctx.fill();
            ctx.globalCompositeOperation = 'lighter';
          } else {
            const headR = isPairStar ? Math.max(ssWorldR * head.sc, ssR) : starR;
            if (!isLeadStar && isPairStar) ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = s.life * 0.95;
            ctx.fillStyle = s.headColor || '#fffce8';
            ctx.beginPath(); ctx.arc(head.sx, head.sy, headR, 0, 6.2832); ctx.fill();
            if (!isLeadStar && isPairStar) ctx.globalCompositeOperation = 'lighter';
          }
          if (!s.mini && !s.dying && heartPhase === 0) {
            for (const sp of specialStars) {
              if (!sp.s.specialAlive) continue;
              const spP = proj3(sp.s.x, sp.s.y, sp.s.z);
              if (!spP) continue;
              const ddx = head.sx - spP.sx, ddy = head.sy - spP.sy;
              if (ddx*ddx + ddy*ddy < hitR2) {
                sp.s.specialAlive = false;
                sp.s.sz = 0; sp.s.dim = 0;
                sp.hitBy = s.id;
                sp.killedById = s.id;
                if (window.cHit) window.cHit(s.id);
                spawnMiniStars(sp.s.x, sp.s.y, sp.s.z, engagedMode ? 3 : 10);
                if (!engagedMode && specialStars.filter(p => p.hitBy === s.id).length >= 2) triggerHeart();
              }
            }
          }
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    function drawPairGhosts(dt, sinX, cosX, sinY, cosY) {
      const W = canvas.width, H = canvas.height;
      const gcx = W * 0.5, gcy = H * 0.5;
      const fov = Math.max(W, H) * 1.6;
      const dts = dt * 0.001;
      function proj(X, Y, Z) {
        const rx = X - camOX, ry = Y - camOY, rz = Z - camOZ;
        const x1 =  rx * cosY + rz * sinY;
        const z1 = -rx * sinY + rz * cosY;
        const y2 =  ry * cosX - z1 * sinX;
        const z2 =  ry * sinX + z1 * cosX;
        const dz = camZ + z2;
        if (dz < 0.01) return null;
        const sc = fov / dz;
        return { sx: x1 * sc + gcx, sy: y2 * sc + gcy, sc };
      }
      for (let pi = pairGhosts.length - 1; pi >= 0; pi--) {
        const g = pairGhosts[pi];
        // Galaxy edge: hard limit pushed well beyond visible stars
        const rEdge = Math.sqrt(g.X*g.X + g.Z*g.Z);
        if (g.controlled && rEdge > 2.0) {
          g.controlled = false;
          const tangX = -g.Z / rEdge, tangZ = g.X / rEdge;
          const slingSpd = Math.sqrt(SS_GRAVITY * 0.15 / rEdge) * 3;
          g.vX = tangX * slingSpd; g.vY *= 0.3; g.vZ = tangZ * slingSpd;
        }
        // Steering: lerp velocity to target; gravity disabled while controlled
        if (g.controlled && g._ctrlTargetVX !== undefined) {
          g.vX += (g._ctrlTargetVX - g.vX) * 0.12;
          g.vY += (g._ctrlTargetVY - g.vY) * 0.12;
          g.vZ += (g._ctrlTargetVZ - g.vZ) * 0.12;
        } else if (!g.controlled) {
          const gr2 = g.X*g.X + g.Y*g.Y + g.Z*g.Z + SS_SOFTEN;
          const gr = Math.sqrt(gr2);
          // Zero gravity inside r=0.25, ramp to full by r=0.5
          const gravFade = Math.max(0, Math.min(1.0, (gr - 0.25) / 0.25));
          const ga = SS_GRAVITY * 0.15 / gr * gravFade;
          g.vX -= ga * g.X / gr * dts; g.vY -= ga * g.Y / gr * dts; g.vZ -= ga * g.Z / gr * dts;
        }
        // Soft boundary: free inside r=1.4, gentle quadratic turn only near true galaxy edge
        const rXZ = Math.sqrt(g.X*g.X + g.Z*g.Z);
        if (rXZ > 1.4) {
          const excess = rXZ - 1.4;
          const pull = SS_GRAVITY * excess * excess * 4 / rXZ;
          g.vX -= g.X * pull * dts;
          g.vZ -= g.Z * pull * dts;
        }
        // Hard speed cap
        const _spd = Math.sqrt(g.vX*g.vX + g.vY*g.vY + g.vZ*g.vZ);
        if (_spd > 0.093) { const _sc = 0.093 / _spd; g.vX *= _sc; g.vY *= _sc; g.vZ *= _sc; }
        g.X += g.vX * dts; g.Y += g.vY * dts; g.Z += g.vZ * dts;
        g.t += dts;
        g.life -= dts * 1000 / (SS_LIFE_MS * 12);
        if (g.life <= 0) { if (followGhost === g) followGhost = null; pairGhosts.splice(pi, 1); continue; }
        const gp = proj(g.X, g.Y, g.Z);
        if (!gp) continue;
        g.lastSc = gp.sc;
        // Playful choreography in camera space.
        // Signed radius: when it passes through 0 the stars kiss and cross sides.
        const rAmp = 40 + 18 * Math.sin(g.t * 0.28 + 0.8);        // 22–58px — less intimate minimum
        const rSlow = rAmp * Math.sin(g.t * 0.50 + 1.5);           // slightly faster oscillation
        // Proximity: 1 when kissing, 0 when separated
        const prox  = Math.max(0, 1 - Math.abs(rSlow) / (rAmp * 0.38 + 1));
        const prox2 = prox * prox;
        // Periodic pulse + moderate close-range fast bounce
        const pulseBase = Math.max(0, Math.sin(g.t * 0.40 + 1.0));
        const pulseFast = prox * Math.max(0, Math.sin(g.t * 4.5 + 0.5)) * 0.45;
        const pulseEnv  = Math.min(1, pulseBase * 0.55 + pulseFast);
        // Occasional excitement burst (~every 10s)
        const exciteEnv = Math.pow(Math.max(0, Math.sin(g.t * 0.31 + 2.2)), 16) * 1.8;
        const rFast  = pulseEnv  * rAmp * 0.50 * Math.sin(g.t * 1.3)
                     + exciteEnv * rAmp * 0.32 * Math.sin(g.t * 2.0);
        const rPulse = 7 * Math.sin(g.t * 0.7);
        const r = rSlow + rFast + rPulse;
        // Base spin
        const spin1   = Math.sin(g.t * 0.55 + 0.3);
        const baseVel = 2.3 * spin1 * Math.sin(g.t * 1.1 + 0.7) * (1 - pulseEnv * 0.60);
        // Close-cuddle twirl — prox² at moderate strength
        const closeTwirl  = prox2 * 6 * (spin1 >= 0 ? 1 : -1);
        // Occasional 720° burst
        const b1 =  Math.pow(Math.max(0,  Math.sin(g.t * 0.38 + 0.7)), 18) * 5;
        const b2 =  Math.pow(Math.max(0, -Math.sin(g.t * 0.29 + 2.5)), 18) * -5;
        // Excitement boost, cap opens to ~1.7× at peak
        const exciteBoost = exciteEnv * 3 * (spin1 >= 0 ? 1 : -1);
        const capRad = Math.PI * (1 + exciteEnv * 0.7);
        const angVel = Math.max(-capRad, Math.min(capRad,
          baseVel + closeTwirl + b1 + b2 + exciteBoost + 0.1 * Math.sin(g.t * 2.1 + 0.4)));
        g.angle += angVel * dts;
        const cA = Math.cos(g.angle), sA = Math.sin(g.angle);
        const dh = r * cA / gp.sc;
        const dv = r * sA / gp.sc;
        const s1X = g.X + cosY * dh + sinX * sinY * dv;
        const s1Y = g.Y + cosX * dv;
        const s1Z = g.Z + sinY * dh - sinX * cosY * dv;
        const s2X = g.X - cosY * dh - sinX * sinY * dv;
        const s2Y = g.Y - cosX * dv;
        const s2Z = g.Z - sinY * dh + sinX * cosY * dv;
        // Accumulate trail points
        g.trail1.push({ X: s1X, Y: s1Y, Z: s1Z });
        g.trail2.push({ X: s2X, Y: s2Y, Z: s2Z });
        if (g.trail1.length > 300) g.trail1.shift();
        if (g.trail2.length > 300) g.trail2.shift();
        // Draw trails
        ctx.globalCompositeOperation = 'lighter';
        for (let side = 0; side < 2; side++) {
          const trail = side === 0 ? g.trail1 : g.trail2;
          const near = side === 0 ? '#ffe0a0' : '#b8ccff';
          const far  = side === 0 ? '#ff9940' : '#7090cc';
          const tl = trail.length;
          const ssR = (isMobile ? 1 : 0.7) * Math.max(2.5, Math.max(W, H) * 0.003);
          for (let j = 1; j < tl; j++) {
            const f = j / tl;
            const tp = proj(trail[j].X, trail[j].Y, trail[j].Z);
            if (!tp) continue;
            ctx.globalAlpha = f * g.life * 0.50;
            ctx.fillStyle = f > 0.5 ? near : far;
            const sz = Math.max(ssR * 1.2, f * ssR * 3.5);
            ctx.fillRect(tp.sx - sz * 0.5, tp.sy - sz * 0.5, sz, sz);
          }
        }
        // Draw glows + heads
        const ssR = (isMobile ? 1 : 0.7) * Math.max(2.5, Math.max(W, H) * 0.003);
        const p1 = proj(s1X, s1Y, s1Z);
        const p2 = proj(s2X, s2Y, s2Z);
        ctx.globalCompositeOperation = 'lighter';
        for (let side = 0; side < 2; side++) {
          const p = side === 0 ? p1 : p2;
          if (!p) continue;
          ctx.globalAlpha = g.life * 0.50;
          const glowR = Math.min(W, H) * 0.15;
          const grd = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, glowR);
          if (side === 0) {
            // warm amber — matches galaxy's orange/K-type stars
            grd.addColorStop(0,    'rgba(255,252,225,1)');
            grd.addColorStop(0.08, 'rgba(255,225,120,0.9)');
            grd.addColorStop(0.3,  'rgba(255,150,40,0.4)');
            grd.addColorStop(1,    'rgba(255,80,0,0)');
          } else {
            // icy blue-white — matches galaxy's B/A-type stars
            grd.addColorStop(0,    'rgba(225,235,255,1)');
            grd.addColorStop(0.08, 'rgba(165,190,255,0.85)');
            grd.addColorStop(0.3,  'rgba(110,140,220,0.35)');
            grd.addColorStop(1,    'rgba(70,100,190,0)');
          }
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(p.sx, p.sy, glowR, 0, 6.2832); ctx.fill();
          ctx.globalAlpha = g.life * 0.90;
          ctx.fillStyle = side === 0 ? '#fffaea' : '#eef1ff';
          ctx.beginPath(); ctx.arc(p.sx, p.sy, ssR * 3.5, 0, 6.2832); ctx.fill();
        }
        // Hit detection — both star heads can explode special stars
        const hitR2g = Math.pow(Math.max(22, ssR * 6), 2);
        const ghostId = -(pi + 1);
        for (const p of [p1, p2]) {
          if (!p) continue;
          for (const sp of specialStars) {
            if (!sp.s.specialAlive) continue;
            const spP = proj(sp.s.x, sp.s.y, sp.s.z);
            if (!spP) continue;
            const ddx = p.sx - spP.sx, ddy = p.sy - spP.sy;
            if (ddx * ddx + ddy * ddy < hitR2g) {
              sp.s.specialAlive = false;
              sp.s.sz = 0; sp.s.dim = 0;
              sp.hitBy = ghostId; sp.killedById = ghostId;
              if (window.cHit) window.cHit(ghostId);
              spawnMiniStars(sp.s.x, sp.s.y, sp.s.z, 10);
            }
          }
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
      }
    }

    // Flight control helpers
    function beginControl(g, x, y) {
      g.controlled = true;
      g._ctrlStartX = x; g._ctrlStartY = y;
      const spd = Math.sqrt(g.vX*g.vX + g.vY*g.vY + g.vZ*g.vZ);
      g._ctrlSpeed = Math.max(0.008, spd);
      if (spd > 0.001) {
        g._ctrlBaseVX = g.vX / spd; g._ctrlBaseVY = g.vY / spd; g._ctrlBaseVZ = g.vZ / spd;
      } else {
        const cY = Math.cos(rotY), sY = Math.sin(rotY);
        g._ctrlBaseVX = -sY; g._ctrlBaseVY = 0; g._ctrlBaseVZ = cY;
      }
      g._ctrlTargetVX = g.vX; g._ctrlTargetVY = g.vY; g._ctrlTargetVZ = g.vZ;
    }
    function steerGhost(g, totalDx, totalDy) {
      // 0.25°/px so 20px drag = 5° deflection
      const yaw   =  totalDx * (Math.PI / 720);
      const pitch = -totalDy * (Math.PI / 720); // drag down → ghost aims up
      const cY = Math.cos(rotY), sY = Math.sin(rotY);
      // Yaw around world-Y
      const cosYaw = Math.cos(yaw), sinYaw = Math.sin(yaw);
      let tvX = g._ctrlBaseVX * cosYaw + g._ctrlBaseVZ * sinYaw;
      let tvY = g._ctrlBaseVY;
      let tvZ = -g._ctrlBaseVX * sinYaw + g._ctrlBaseVZ * cosYaw;
      // Pitch around camera-right axis (cY, 0, sY) via Rodrigues
      const cosPitch = Math.cos(pitch), sinPitch = Math.sin(pitch);
      const kdotv = cY * tvX + sY * tvZ;
      const rx = tvX * cosPitch + (-sY * tvY) * sinPitch + cY * kdotv * (1 - cosPitch);
      const ry = tvY * cosPitch + (sY * tvX - cY * tvZ) * sinPitch;
      const rz = tvZ * cosPitch + ( cY * tvY) * sinPitch + sY * kdotv * (1 - cosPitch);
      const len = Math.sqrt(rx*rx + ry*ry + rz*rz) || 1;
      const spd = g._ctrlSpeed;
      g._ctrlTargetVX = rx / len * spd;
      g._ctrlTargetVY = ry / len * spd;
      g._ctrlTargetVZ = rz / len * spd;
    }

    window.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        e.preventDefault();
        dragging = true;
        ldx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        ldy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      } else if (followGhost) {
        e.preventDefault();
        beginControl(followGhost, e.touches[0].clientX, e.touches[0].clientY);
        ldx = e.touches[0].clientX; ldy = e.touches[0].clientY;
      } else {
        msx = ldx = e.touches[0].clientX;
        msy = ldy = e.touches[0].clientY;
        ssBegin(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: false });
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2) {
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        dragRY += (cx - ldx) / window.innerWidth  * Math.PI * 1.8;
        dragRX += (cy - ldy) / window.innerHeight * Math.PI * 0.8;
        dragRX  = Math.max(-0.9, Math.min(0.9, dragRX));
        ldx = cx; ldy = cy;
      } else if (followGhost && followGhost.controlled) {
        const nx = e.touches[0].clientX, ny = e.touches[0].clientY;
        steerGhost(followGhost, nx - followGhost._ctrlStartX, ny - followGhost._ctrlStartY);
        ldx = nx; ldy = ny;
      } else {
        const nx = e.touches[0].clientX, ny = e.touches[0].clientY;
        ssLX = nx; ssLY = ny; msx = nx; msy = ny;
      }
    }, { passive: false });
    window.addEventListener('touchend', e => {
      if (e.touches.length === 0) {
        dragging = false; msx = -9999; msy = -9999;
        if (followGhost && followGhost.controlled) {
          followGhost.controlled = false;
        } else if (!hintDragging) {
          ssEnd();
        }
      }
    });

    // ── Drag hint ─────────────────────────────────────────────────────────
    {
      const hintEl = document.getElementById('drag-hint');
      let hActive = false, hGhost = null;

      function hStart(cx, cy) {
        if (hActive) return;
        hActive = true; hintDragging = true;
        const ghost = document.createElement('div');
        ghost.className = 'dh-ghost';
        ghost.innerHTML = hintEl.innerHTML;
        ghost.style.cssText += `left:${cx}px;top:${cy}px;`;
        // Start pressed (scale 0.88), spring to 1.0 on next frame
        ghost.style.transform = 'translate(-50%,-50%) scale(0.88)';
        document.body.appendChild(ghost);
        hGhost = ghost;
        requestAnimationFrame(() => {
          ghost.style.transition = 'transform 0.18s cubic-bezier(0.34,1.56,0.64,1)';
          ghost.style.transform  = 'translate(-50%,-50%) scale(1.0)';
        });
        hintEl.style.opacity = '0';
        hintEl.style.pointerEvents = 'none';
        ssBegin(cx, cy);
      }

      function hMove(cx, cy) {
        if (!hActive || !hGhost) return;
        hGhost.style.transition = 'none';
        hGhost.style.left = cx + 'px'; hGhost.style.top = cy + 'px';
        ssLX = cx; ssLY = cy;
      }

      function hEnd(cx, cy) {
        if (!hActive) return;
        hActive = false; hintDragging = false;
        ssLX = cx; ssLY = cy;
        if (hGhost) {
          const g = hGhost; hGhost = null;
          g.style.transition = 'transform 0.5s ease-in, opacity 0.42s ease-in';
          g.offsetHeight; // force reflow so transition fires
          g.style.transform = 'translate(-50%,-50%) scale(0)';
          g.style.opacity   = '0';
          setTimeout(() => g.remove(), 550);
        }
        hintEl.style.visibility = 'hidden';
        // Spawn: always if dragged ≥ 6px, with minimum speed
        const dx = cx - ssStartX, dy = cy - ssStartY;
        if (dx*dx + dy*dy >= 36) {
          const dt = Math.max(50, performance.now() - ssStartT);
          let vsx = dx/dt*1000, vsy = dy/dt*1000;
          const spd = Math.sqrt(vsx*vsx + vsy*vsy);
          if (spd < 60) { const f = 60/Math.max(spd,1); vsx *= f; vsy *= f; }
          clearTimeout(ssPending);
          ssSpawn(cx, cy, vsx, vsy);
        }
      }

      hintEl.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        e.stopPropagation(); e.preventDefault();
        hStart(e.clientX, e.clientY);
      });
      hintEl.addEventListener('touchstart', e => {
        e.stopPropagation(); e.preventDefault();
        hStart(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });
      window.addEventListener('mousemove', e => { hMove(e.clientX, e.clientY); });
      window.addEventListener('mouseup',   e => { if (hActive) hEnd(e.clientX, e.clientY); });
      window.addEventListener('touchmove', e => {
        if (hActive && e.touches.length) hMove(e.touches[0].clientX, e.touches[0].clientY);
      });
      window.addEventListener('touchend', e => {
        if (hActive && e.changedTouches.length) {
          const t = e.changedTouches[0]; hEnd(t.clientX, t.clientY);
        }
      });
    }

    // ── Render loop ───────────────────────────────────────────────────────
    function frame(ts) {
      requestAnimationFrame(frame);
      const dt = Math.min(ts - last, 50); last = ts;

      if (heartPhase === 1) {
        heartT = Math.min(1, heartT + dt / HEART_FORM);
        rotMult = 1 - heartT;
        const ef1 = heartT * heartT * (3 - 2 * heartT);
        dragRX = rotX = heartStartRotX + (Math.PI / 2 - heartStartRotX) * ef1;
        if (heartT >= 1) {
          heartT = 0; heartPhase = 2;
          if (window.cLog && heartMsgSet) heartMsgSet.form.forEach(m => window.cLog(m));
          if (proposalMode) spawnFireworks();
        }
      } else if (heartPhase === 2) {
        rotMult = 0;
        dragRX = rotX = Math.PI / 2;
        heartT = Math.min(1, heartT + dt / HEART_HOLD);
        if (heartT >= 1) { heartT = 0; heartPhase = 3;
          for (const s of shootingStars) { if (s.mini) { s.locked = false; s.orbitSign = 0; s.orbitDir = 0; } }
        }
      } else if (heartPhase === 3) {
        heartT = Math.min(1, heartT + dt / HEART_RETURN);
        rotMult = heartT;
        const ef3 = heartT * heartT * (3 - 2 * heartT);
        dragRX = rotX = Math.PI / 2 + (heartStartRotX - Math.PI / 2) * ef3;
        if (heartT >= 1) {
          heartT = 0; heartPhase = 0; rotMult = 1;
          if (window.cLog && heartMsgSet) heartMsgSet.restore.forEach(m => window.cLog(m));
          dragRX = rotX = heartStartRotX;
          for (const s of shootingStars) {
            if (s.mini) { s.vY += (Math.random() - 0.5) * 0.04; s.dying = true; }
          }
          if (proposalMode) {
            proposalMode = false;
            engagedMode = true;
            rebuildSpecialStars(40); ssSpawn.hinted = false;
            startEngagedMusic();
            const cp = document.getElementById('console-pane');
            if (cp) { cp.style.transition = 'opacity 2s ease'; cp.style.opacity = '0'; setTimeout(() => { cp.style.display = 'none'; }, 2000); }
          }
          for (const sp of specialStars) {
            if (!sp.s.specialAlive) {
              sp.s.specialAlive = true;
              sp.s.sz = sp.savedSz; sp.s.dim = sp.savedDim;
              sp.hitBy = null; sp.killedById = null;
            }
          }
        }
      }
      if (heartPhase > 0) heartRot += dt * 0.00055;  // gentle orbit, ~one turn over 11s
      autoY += 0.00007 * dt * rotMult;
      // Respawn killed special stars in engaged mode after a short delay
      if (engagedMode && heartPhase === 0) {
        const now = performance.now();
        for (const sp of specialStars) {
          if (!sp.s.specialAlive) {
            if (!sp.diedAt) sp.diedAt = now;
            else if (now - sp.diedAt > 5000) {
              sp.s.specialAlive = true;
              sp.s.sz = sp.savedSz; sp.s.dim = sp.savedDim;
              sp.hitBy = null; sp.killedById = null;
              sp.diedAt = null;
            }
          }
        }
      }
      if (followGhost && !pairGhosts.includes(followGhost)) followGhost = null;
      // Start following after 2s delay; camFollowT=0 gives a ~5s lerp to settled
      if (!followGhost) {
        for (const g of pairGhosts) {
          if (!g.followStarted && g.t > 2) {
            g.followStarted = true; followGhost = g; camFollowT = 0; break;
          }
        }
      }
      if (followStar && shootingStars.indexOf(followStar) === -1) followStar = null;
      const ft = followGhost || (engagedMode && followStar);
      if (ft) {
        camFollowT += (1 - camFollowT) * 0.005;
        const t2 = camFollowT * camFollowT; // quadratic ease-in: all rates start at zero
        const vLen = Math.sqrt(ft.vX*ft.vX + ft.vZ*ft.vZ) + 1e-8;
        const behind = 0.1;
        const tX = ft.X - ft.vX/vLen * behind;
        const tY = ft.Y;
        const tZ = ft.Z - ft.vZ/vLen * behind;
        const posRate = t2 * 0.050;
        camOX += (tX - camOX) * posRate;
        camOY += (tY - camOY) * posRate;
        camOZ += (tZ - camOZ) * posRate;
        const tRY = Math.atan2(-ft.vX, ft.vZ);
        let diff = tRY - rotY;
        diff -= Math.round(diff / (Math.PI * 2)) * (Math.PI * 2);
        rotY += diff * (t2 * 0.022);
        dragRY = rotY - autoY;
        dragRX += (0.12 - dragRX) * (0.004 + t2 * 0.018);
        dragRX = Math.max(-0.9, Math.min(0.9, dragRX));
        camZ += ((followGhost ? 0.20 : 0.37) - camZ) * (0.003 + t2 * 0.007);
      } else {
        camOX *= 0.98; camOY *= 0.98; camOZ *= 0.98;
        camZ += (1.4 - camZ) * 0.04;
      }
      rotX  += (dragRX - rotX) * 0.1;
      rotY  += (autoY + dragRY - rotY) * 0.1;

      const W = canvas.width, H = canvas.height;
      const cx = W * 0.5, cy = H * 0.5;
      // Large fov + close camera = galaxy fills & bleeds past viewport
      const fov  = Math.max(W, H) * 1.6;

      for (const sp of specialStars) {
        if (sp.s.specialAlive) {
          sp.s.sz  += (sp.savedSz  - sp.s.sz)  * 0.02;
          sp.s.dim += (sp.savedDim - sp.s.dim) * 0.02;
        }
      }

      const sinX = Math.sin(rotX), cosX = Math.cos(rotX);
      const sinY = Math.sin(rotY), cosY = Math.cos(rotY);

      const proj = [];
      for (let si = 0; si < stars.length; si++) {
        const s = stars[si];
        const rx = s.x - camOX, ry = s.y - camOY, rz = s.z - camOZ;
        const x1 =  rx * cosY + rz * sinY;
        const z1 = -rx * sinY + rz * cosY;
        const y2 =  ry * cosX - z1 * sinX;
        const z2 =  ry * sinX + z1 * cosX;
        const dz = camZ + z2;
        if (dz < 0.01) continue;
        const sc = fov / dz;
        proj.push({ sx: x1 * sc + cx, sy: y2 * sc + cy, sc, z: z2, s, si });
      }
      proj.sort((a, b) => a.z - b.z);

      // Sample trail
      if (msx > -100 && ts - lastSample > 50) {
        trailX[trailHead] = msx; trailY[trailHead] = msy; trailT[trailHead] = ts;
        trailHead = (trailHead + 1) % TRAIL;
        lastSample = ts;
      }

      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';

      const shortSide  = Math.min(W, H);
      const brightRad  = shortSide * 0.30;
      const sparkRad   = shortSide * 0.07;

      // Bloom envelope: sin bell 0→1→0 over the full 11s heart sequence, peaking mid-hold
      let heartBloomEf = 0;
      if (heartPhase > 0) {
        const TOTAL = HEART_FORM + HEART_HOLD + HEART_RETURN;
        // Rise during phase 1, hold then fade during phase 2, gone before phase 3
        if (heartPhase === 1) {
          heartBloomEf = heartT * heartT * (3 - 2 * heartT);
        } else if (heartPhase === 2) {
          const t2 = heartT * 2;  // 0→2; peak=1, then fall
          heartBloomEf = t2 < 1 ? 1 : 1 - (t2-1)*(t2-1)*(3-2*(t2-1));
        }
      }

      for (const p of proj) {
        const { sc, s, si } = p;
        let sx = p.sx, sy = p.sy;

        if (heartPhase > 0) {
          const ef = heartPhase === 2 ? 1
            : heartPhase === 1 ? heartT * heartT * (3 - 2 * heartT)
            : (1 - heartT) * (1 - heartT) * (3 - 2 * (1 - heartT));
          const th = (si / stars.length) * Math.PI * 2;
          let hx, hy;
          if (proposalMode) {
            if (si < stars.length * 0.05) {
              const gt = (si / (stars.length * 0.05)) * Math.PI * 2;
              hx = Math.sin(gt) * 4;
              hy = -18 - Math.abs(Math.cos(gt)) * 6;
            } else {
              hx = Math.cos(th) * 16;
              hy = Math.sin(th) * 16;
            }
          } else {
            hx = 16 * Math.pow(Math.sin(th), 3);
            hy = -(13*Math.cos(th) - 5*Math.cos(2*th) - 2*Math.cos(3*th) - Math.cos(4*th));
          }
          const hs = Math.min(W, H) * 0.018;
          const offX = Math.cos((s.heartOffAng || 0) + heartRot) * (s.heartOffR || 0);
          const offY = Math.sin((s.heartOffAng || 0) + heartRot) * (s.heartOffR || 0);
          sx += (cx + hx * hs + offX - sx) * ef * (s.heartPull || 0);
          sy += (cy + hy * hs + offY - sy) * ef * (s.heartPull || 0);
        }

        const baseR = s.sz * sc;
        if (baseR < 0.07) continue;
        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;

        const dx = sx - msx, dy = sy - msy;
        const d2 = dx*dx + dy*dy;
        const brightR2 = brightRad * brightRad;
        const sparkR2  = sparkRad  * sparkRad;
        let brightF = 0, cursorSF = 0;
        if (msx > -100) {
          if (d2 < brightR2) {
            const bn = Math.sqrt(d2) / brightRad;
            brightF  = (1 - bn) * (1 - bn);
          }
          if (d2 < sparkR2) cursorSF = 1 - d2 / sparkR2;
        }

        let trailF = 0;
        for (let ti = 0; ti < TRAIL; ti++) {
          if (!trailT[ti]) continue;
          const age = ts - trailT[ti];
          if (age > 1200) continue;
          const tdx = sx - trailX[ti], tdy = sy - trailY[ti];
          const td2 = tdx*tdx + tdy*tdy;
          if (td2 >= sparkR2) continue;
          const tf = (1 - td2 / sparkR2) * (1 - age / 1200);
          if (tf > trailF) trailF = tf;
        }

        const sparkInfluence = Math.max(cursorSF, trailF);
        const twinkle   = 0.5 + 0.5 * Math.sin(ts * 0.001 * s.twinkSpeed + s.twinkPhase);
        const wandFlash = Math.pow(Math.max(0, Math.sin(ts * 0.002 * s.twinkSpeed + s.twinkPhase * 2.3)), 3);
        const wand      = sparkInfluence * s.glitFactor * wandFlash * 9;
        const spark     = brightF * 0.7 + wand + twinkle * s.glitFactor * 0.6;
        const bright    = s.dim * (1 + spark);

        const ri = Math.min(255, s.cr * bright * 255) | 0;
        const gi = Math.min(255, s.cg * bright * 255) | 0;
        const bi = Math.min(255, s.cb * bright * 255) | 0;

        ctx.globalAlpha = Math.min(0.95, s.dim * 0.85 + spark * 0.35);
        ctx.fillStyle   = `rgb(${ri},${gi},${bi})`;

        if (baseR < 1.0) {
          ctx.fillRect(sx | 0, sy | 0, 1, 1);
        } else {
          ctx.beginPath();
          ctx.arc(sx, sy, baseR, 0, 6.2832);
          ctx.fill();
        }

        if (s.special && s.specialAlive) {
          const fadeT = s.dim / 0.9;
          // Soft pulsing halo
          const pulse = 0.8 + 0.2 * Math.sin(ts * 0.0025 + s.twinkPhase);
          ctx.globalAlpha = 0.11 * pulse * fadeT;
          ctx.beginPath();
          ctx.arc(sx, sy, Math.max(8, baseR * 4), 0, 6.2832);
          ctx.fill();
          // Diffraction spikes
          const spike = Math.max(28, baseR * 20);
          const a = Math.min(0.52, s.dim * 0.34 + 0.22) * pulse * fadeT;
          for (const [x1, y1, x2, y2] of [
            [sx - spike, sy, sx + spike, sy],
            [sx, sy - spike, sx, sy + spike]
          ]) {
            const g = ctx.createLinearGradient(x1, y1, x2, y2);
            g.addColorStop(0,    `rgba(${ri},${gi},${bi},0)`);
            g.addColorStop(0.35, `rgba(${ri},${gi},${bi},${(a * 0.45).toFixed(2)})`);
            g.addColorStop(0.5,  `rgba(${ri},${gi},${bi},${a.toFixed(2)})`);
            g.addColorStop(0.65, `rgba(${ri},${gi},${bi},${(a * 0.45).toFixed(2)})`);
            g.addColorStop(1,    `rgba(${ri},${gi},${bi},0)`);
            ctx.globalAlpha = 1;
            ctx.lineWidth = 2;
            ctx.strokeStyle = g;
            ctx.beginPath();
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.stroke();
          }
        }

        // Heart-line bloom: halo + diffraction for near-line stars during heart phases
        if (heartBloomEf > 0.01 && s.heartPull > 0.94) {
          const bStr = (s.heartPull - 0.94) / 0.06;
          const glitter = Math.pow(Math.max(0, Math.sin(ts * 0.0022 + s.twinkPhase * 3.1)), 5);
          const bloom = heartBloomEf * bStr * (0.10 + 0.90 * glitter);
          // Soft halo for all near-line stars
          ctx.fillStyle = `rgb(${ri},${gi},${bi})`;
          ctx.globalAlpha = 0.045 * bloom;
          ctx.beginPath();
          ctx.arc(sx, sy, Math.max(3, baseR * (s.heartBloomR || 4)), 0, 6.2832);
          ctx.fill();
          // Diffraction spikes — lower threshold so more stars get them
          if (s.heartPull > 0.98) {
            const spikeStr = (s.heartPull - 0.98) / 0.02;
            const spike = Math.max(14, baseR * 12) * bloom;
            const a = Math.min(0.52, s.dim * 0.35 + 0.15) * bloom * spikeStr;
            if (a > 0.02) {
              for (const [x1, y1, x2, y2] of [
                [sx - spike, sy, sx + spike, sy],
                [sx, sy - spike, sx, sy + spike]
              ]) {
                const g = ctx.createLinearGradient(x1, y1, x2, y2);
                g.addColorStop(0,   `rgba(${ri},${gi},${bi},0)`);
                g.addColorStop(0.5, `rgba(${ri},${gi},${bi},${a.toFixed(2)})`);
                g.addColorStop(1,   `rgba(${ri},${gi},${bi},0)`);
                ctx.globalAlpha = 1;
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = g;
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
              }
            }
          }
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (shootingStars.length) ssDraw(dt, sinX, cosX, sinY, cosY);
      if (pairGhosts.length) drawPairGhosts(dt, sinX, cosX, sinY, cosY);
      if (_mus && followGhost) {
        _musRise = _musRise * 0.96 + (followGhost.vY || 0) * 40 * 0.04;
        _mus.shelf.gain.setTargetAtTime(
          Math.max(-3, Math.min(3, _musRise * 180)), _mus.ctx.currentTime, 0.8);
      }

      const wantFade = shootingStars.length > 0 || engagedMode;
      if (wantFade !== heroFaded) {
        heroFaded = wantFade;
        heroEls.forEach(el => {
          el.style.transition = wantFade ? 'opacity 6s ease' : 'opacity 3s ease';
          el.style.opacity = wantFade ? '0' : '1';
        });
      }
    }

    requestAnimationFrame(frame);
  })();

  document.getElementById('yr').textContent = new Date().getFullYear();

  // Console typewriter
  {
    const pane = document.getElementById('console-pane');
    const MAX = 7;
    const lines = [];
    let busy = false;
    const queue = [];

    function updateOpacity() {
      const n = lines.length;
      lines.forEach((el, i) => {
        el.style.opacity = Math.max(0.06, 1 - (n - 1 - i) * 0.2);
      });
      while (lines.length > MAX) lines.shift().remove();
    }

    function addLine(el) {
      pane.appendChild(el);
      const h = el.offsetHeight;
      pane.style.transition = 'none';
      pane.style.transform = `translateY(${h}px)`;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        pane.style.transition = 'transform 0.32s ease';
        pane.style.transform = 'translateY(0)';
      }));
      lines.push(el);
      updateOpacity();
    }

    function typeLine(text, cb) {
      const el = document.createElement('div');
      el.className = 'console-line';
      const cur = document.createElement('span');
      cur.className = 'console-cursor';
      cur.textContent = '.';
      el.appendChild(cur);
      addLine(el);
      let i = 0;
      (function tick() {
        if (i < text.length) {
          el.insertBefore(document.createTextNode(text[i++]), cur);
          setTimeout(tick, 36 + Math.random() * 30);
        } else if (cb) {
          setTimeout(cb, 1000);
        }
      })();
    }

    function processQueue() {
      if (!queue.length) { busy = false; return; }
      busy = true;
      typeLine(queue.shift(), processQueue);
    }

    window.cLog = function(msg) {
      queue.push(msg);
      if (!busy) processQueue();
    };

    const ssHitMap = {};

    window.cLogShot = function(id) {
      const el = document.createElement('div');
      el.className = 'console-line';
      el.appendChild(document.createTextNode('> '));
      const stars = [0, 1].map(() => {
        const sp = document.createElement('span');
        sp.textContent = '✦';
        sp.style.cssText = 'opacity:0.35;transition:opacity 0.35s ease;';
        el.appendChild(sp);
        el.appendChild(document.createTextNode(' '));
        return sp;
      });
      ssHitMap[id] = { stars, hits: 0 };
      addLine(el);
    };

    window.cHit = function(shotId) {
      const e = ssHitMap[shotId];
      if (!e || e.hits >= 2) return;
      e.stars[e.hits].style.opacity = '1';
      e.hits++;
    };

    window.cLogInstant = function(text, pre) {
      const el = document.createElement('div');
      el.className = 'console-line';
      if (pre) el.style.whiteSpace = 'pre';
      el.textContent = text;
      addLine(el);
    };

    window.cLogHeart = function(count) {
      let rows;
      if (count === 4) {
        rows = ['>    _◆_', '>   /   \\', '>  |     |', '>   \\___/', '>    ×4'];
      } else {
        const tag = count > 1 ? ' ×' + count : '';
        rows = ['>  ** **', '> *******', '>  *****', '>   ***', '>    *' + tag];
      }
      rows.forEach((r, i) => setTimeout(() => window.cLogInstant(r, true), 350 + i * 600));
    };

    // DEBUG cheat: tap console 10 times to jump to engagement mode
    let _cheatTaps = 0, _cheatTimer;
    document.addEventListener('mousedown', function(e) {
      const r = pane.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) return;
      clearTimeout(_cheatTimer);
      _cheatTaps++;
      _cheatTimer = setTimeout(() => { _cheatTaps = 0; }, 2000);
      if (_cheatTaps >= 10 && window.cheatEngage) { window.cheatEngage(); _cheatTaps = 0; }
    });
    document.addEventListener('touchstart', function(e) {
      const r = pane.getBoundingClientRect();
      const t = e.touches[0];
      if (t.clientX < r.left || t.clientX > r.right || t.clientY < r.top || t.clientY > r.bottom) return;
      clearTimeout(_cheatTimer);
      _cheatTaps++;
      _cheatTimer = setTimeout(() => { _cheatTaps = 0; }, 2000);
      if (_cheatTaps >= 10 && window.cheatEngage) { window.cheatEngage(); _cheatTaps = 0; }
    }, { passive: true });

    setTimeout(() => cLog('> hello. i\'ve been star-ing at this screen.'), 700);
    setTimeout(() => cLog('> 5,000 stars loaded.'), 2500);
    setTimeout(() => cLog('> drag ✦ to fire a shot.'), 4500);
    setTimeout(() => { cLog(('ontouchstart' in window || navigator.maxTouchPoints > 0) ? '> 2 fingers to rotate the galaxy.' : '> middle mouse to rotate the galaxy.'); }, 10000);
  }
  </script>
