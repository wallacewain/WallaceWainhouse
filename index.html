  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Wallace Wainhouse",
    "url": "https://wallacewainhouse.com",
    "description": "Free tools that run entirely in your browser. No ads, no tracking, nothing uploaded."
  }
  </script>
  <style>
    #galaxy-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      background: #0e0e10;
    }
    header, main, footer { position: relative; z-index: 1; }
    .hero {
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 4rem;
    }
    .hero h1 { margin-bottom: 1rem; }
    .hero h1, .hero p { text-shadow: 0 0 40px #0e0e10, 0 0 80px #0e0e10; }
  </style>
</head>
<body>
  <canvas id="galaxy-bg"></canvas>
  <header>
    <nav>
      <a href="/" class="logo"><svg viewBox="-46.0 -46.0 1492.0 332.0" height="26" xmlns="http://www.w3.org/2000/svg" aria-label="WMW" fill="#d4d4d8"><polygon points="-40,0 40,0 180,240 100,240"/><polygon points="100,240 180,240 320,0 240,0"/><polygon points="240,0 320,0 460,240 380,240"/><polygon points="380,240 460,240 600,0 520,0"/><polygon points="520,0 600,0 740,240 660,240"/><polygon points="660,240 740,240 880,0 800,0"/><polygon points="800,0 880,0 1020,240 940,240"/><polygon points="940,240 1020,240 1160,0 1080,0"/><polygon points="1080,0 1160,0 1300,240 1220,240"/><polygon points="1220,240 1300,240 1440,0 1360,0"/></svg></a>
      <ul>
        <li><a href="/" class="active">Home</a></li>
        <li><a href="/tools/">Tools</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h1>Wallace Wainhouse</h1>
      <p>Tools, experiments, and other things that seemed like a good idea at the time.</p>
    </section>
  </main>
  <footer>
    <p>&copy; <span id="yr"></span> Wallace Wainhouse</p>
  </footer>
  <script>
  (function () {
    const canvas = document.getElementById('galaxy-bg');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Galaxy generation ─────────────────────────────────────────────────
    const isMobile = window.innerWidth < 768;
    const COUNT    = isMobile ? 3000 : 7000;
    const BRANCHES = 3, SPIN = 1.8, RND_PWR = 3;

    const stars = [];
    for (let i = 0; i < COUNT; i++) {
      const halo = i < COUNT * 0.07;
      let x, y, z;

      if (halo) {
        const r     = 0.6 + Math.random() * 0.9;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        x = r * Math.sin(phi) * Math.cos(theta);
        y = r * Math.cos(phi) * 0.1;
        z = r * Math.sin(phi) * Math.sin(theta);
      } else {
        const r      = Math.pow(Math.random(), 0.55);
        const branch = (i % BRANCHES) / BRANCHES * Math.PI * 2;
        const spin   = r * SPIN * Math.PI;
        const rnd    = () => Math.pow(Math.random(), RND_PWR) * (Math.random() < 0.5 ? 1 : -1);
        x = Math.cos(branch + spin) * r + rnd() * r * 0.32;
        y = rnd() * 0.032;
        z = Math.sin(branch + spin) * r + rnd() * r * 0.32;
      }

      const t = Math.min(Math.sqrt(x*x + z*z), 1);

      // Galaxy-realistic colours: warm orange core → white → blue arms → deep blue outer
      let cr, cg, cb;
      if (t < 0.12) {
        cr = 1.0; cg = 0.82 + Math.random() * 0.1; cb = 0.38 + Math.random() * 0.18;
      } else if (t < 0.32) {
        const f = (t - 0.12) / 0.20;
        cr = 1.0; cg = 0.82 + (1.0 - 0.82) * f; cb = 0.38 + (1.0 - 0.38) * f;
      } else if (t < 0.65) {
        cr = 0.62 + Math.random() * 0.28; cg = 0.72 + Math.random() * 0.22; cb = 1.0;
      } else {
        cr = 0.28 + Math.random() * 0.22; cg = 0.38 + Math.random() * 0.22; cb = 0.80 + Math.random() * 0.18;
      }
      if (halo) { cr *= 0.6; cg *= 0.6; cb *= 0.6; }

      const dim = halo ? (0.18 + Math.random() * 0.25) : (0.28 + Math.random() * 0.58);
      const sz  = halo
        ? (0.0006 + Math.random() * 0.0012)
        : (0.0004 + Math.random() * 0.0018) * (1 - t * 0.35);
      const glitFactor  = Math.pow(Math.random(), 2.5);
      const twinkPhase  = Math.random() * Math.PI * 2;
      const twinkSpeed  = 2.0 + Math.random() * 5.0;
      stars.push({ x, y, z, cr, cg, cb, dim, sz, glitFactor, twinkPhase, twinkSpeed });
    }

    // ── Interaction state — orientation only via click-drag ───────────────
    let msx = -9999, msy = -9999;
    let dragging = false, ldx = 0, ldy = 0;
    let dragRX = 0.28, dragRY = 0;
    let rotX = 0.28, rotY = 0, autoY = 0, last = 0;

    window.addEventListener('mousedown', e => { dragging = true;  ldx = e.clientX; ldy = e.clientY; });
    window.addEventListener('mouseup',   () => { dragging = false; });
    window.addEventListener('mousemove', e => {
      msx = e.clientX; msy = e.clientY;
      if (!dragging) return;
      dragRY += (e.clientX - ldx) / window.innerWidth  * Math.PI * 1.8;
      dragRX += (e.clientY - ldy) / window.innerHeight * Math.PI * 0.8;
      dragRX  = Math.max(-0.9, Math.min(0.9, dragRX));
      ldx = e.clientX; ldy = e.clientY;
    });
    window.addEventListener('mouseleave', () => { msx = -9999; msy = -9999; dragging = false; });

    window.addEventListener('touchstart', e => {
      dragging = true; ldx = e.touches[0].clientX; ldy = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchmove', e => {
      dragRY += (e.touches[0].clientX - ldx) / window.innerWidth  * Math.PI * 1.8;
      dragRX += (e.touches[0].clientY - ldy) / window.innerHeight * Math.PI * 0.8;
      dragRX  = Math.max(-0.9, Math.min(0.9, dragRX));
      ldx = e.touches[0].clientX; ldy = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchend', () => { dragging = false; });

    // ── Render loop ───────────────────────────────────────────────────────
    function frame(ts) {
      requestAnimationFrame(frame);
      const dt = Math.min(ts - last, 50); last = ts;

      autoY += 0.00007 * dt;
      rotX  += (dragRX - rotX) * 0.1;
      rotY  += (autoY + dragRY - rotY) * 0.1;

      const W = canvas.width, H = canvas.height;
      const cx = W * 0.5, cy = H * 0.5;
      // Large fov + close camera = galaxy fills & bleeds past viewport
      const fov  = Math.max(W, H) * 1.6;
      const camZ = 1.4;

      const sinX = Math.sin(rotX), cosX = Math.cos(rotX);
      const sinY = Math.sin(rotY), cosY = Math.cos(rotY);

      const proj = [];
      for (const s of stars) {
        const x1 =  s.x * cosY + s.z * sinY;
        const z1 = -s.x * sinY + s.z * cosY;
        const y2 =  s.y * cosX - z1 * sinX;
        const z2 =  s.y * sinX + z1 * cosX;
        const dz = camZ + z2;
        if (dz < 0.01) continue;
        const sc = fov / dz;
        proj.push({ sx: x1 * sc + cx, sy: y2 * sc + cy, sc, z: z2, s });
      }
      proj.sort((a, b) => a.z - b.z);

      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';

      const mRad = Math.min(W, H) * 0.32;

      for (const p of proj) {
        const { sx, sy, sc, s } = p;
        const baseR = s.sz * sc;
        if (baseR < 0.07) continue;
        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;

        const dx = sx - msx, dy = sy - msy;
        const nd = Math.sqrt(dx*dx + dy*dy) / mRad;
        const falloff  = msx < -100 ? 0 : Math.max(0, 1 - nd);
        const twinkle  = 0.5 + 0.5 * Math.sin(ts * 0.001 * s.twinkSpeed + s.twinkPhase);
        const wand     = falloff * s.glitFactor * 12;
        const spark    = wand + twinkle * s.glitFactor * 0.6;
        const bright   = s.dim * (1 + spark);

        const ri = Math.min(255, s.cr * bright * 255) | 0;
        const gi = Math.min(255, s.cg * bright * 255) | 0;
        const bi = Math.min(255, s.cb * bright * 255) | 0;

        ctx.globalAlpha = Math.min(0.95, s.dim * 0.85 + spark * 0.35);
        ctx.fillStyle   = `rgb(${ri},${gi},${bi})`;

        if (baseR < 1.0) {
          ctx.fillRect(sx | 0, sy | 0, 1, 1);
        } else {
          ctx.beginPath();
          ctx.arc(sx, sy, baseR, 0, 6.2832);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    requestAnimationFrame(frame);
  })();

  document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
