  <style>
    #galaxy-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      background: #0e0e10;
    }
    header, main, footer { position: relative; z-index: 1; }
    .hero {
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 4rem;
    }
    .hero h1 { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <canvas id="galaxy-bg"></canvas>
  <header>
    <nav>
      <a href="/" class="logo"><svg viewBox="-46.0 -46.0 1492.0 332.0" height="26" xmlns="http://www.w3.org/2000/svg" aria-label="WMW" fill="#d4d4d8"><polygon points="-40,0 40,0 180,240 100,240"/><polygon points="100,240 180,240 320,0 240,0"/><polygon points="240,0 320,0 460,240 380,240"/><polygon points="380,240 460,240 600,0 520,0"/><polygon points="520,0 600,0 740,240 660,240"/><polygon points="660,240 740,240 880,0 800,0"/><polygon points="800,0 880,0 1020,240 940,240"/><polygon points="940,240 1020,240 1160,0 1080,0"/><polygon points="1080,0 1160,0 1300,240 1220,240"/><polygon points="1220,240 1300,240 1440,0 1360,0"/></svg></a>

  <main>
    <section class="hero">
      <h1>Wallace Wainhouse</h1>
      <p><a href="/tools/" class="btn">Browse tools</a></p>
    </section>
  </main>
  <footer>
    <p>&copy; <span id="yr"></span> Wallace Wainhouse</p>
  </footer>
  <script>
  (function () {
    const canvas = document.getElementById('galaxy-bg');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Star sprite (glow dot on offscreen canvas) ───────────────────────
    const SPRITE_SIZE = 64;
    const sprite = document.createElement('canvas');
    sprite.width = sprite.height = SPRITE_SIZE;
    const sc = sprite.getContext('2d');
    const sg = sc.createRadialGradient(32, 32, 0, 32, 32, 32);
    sg.addColorStop(0,    'rgba(255,255,255,1)');
    sg.addColorStop(0.15, 'rgba(255,255,255,0.8)');
    sg.addColorStop(0.5,  'rgba(200,210,255,0.3)');
    sg.addColorStop(1,    'rgba(0,0,0,0)');
    sc.fillStyle = sg;
    sc.fillRect(0, 0, SPRITE_SIZE, SPRITE_SIZE);

    // ── Galaxy generation ─────────────────────────────────────────────────
    const isMobile = window.innerWidth < 768;
    const COUNT    = isMobile ? 3000 : 7000;
    const BRANCHES = 3, SPIN = 1.8, RND_PWR = 3, GAL_R = 1;

    const stars = [];
    for (let i = 0; i < COUNT; i++) {
      const halo = i < COUNT * 0.08;
      let x, y, z;

      if (halo) {
        const r     = (0.5 + Math.random()) * GAL_R;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        x = r * Math.sin(phi) * Math.cos(theta);
        y = r * Math.cos(phi) * 0.12;
        z = r * Math.sin(phi) * Math.sin(theta);
      } else {
        const r      = Math.pow(Math.random(), 0.6) * GAL_R;
        const branch = (i % BRANCHES) / BRANCHES * Math.PI * 2;
        const spin   = r * SPIN * Math.PI;
        const rnd    = () => Math.pow(Math.random(), RND_PWR) * (Math.random() < 0.5 ? 1 : -1);
        x = Math.cos(branch + spin) * r + rnd() * r * 0.35;
        y = rnd() * 0.04;
        z = Math.sin(branch + spin) * r + rnd() * r * 0.35;
      }

      // t = 0 (core) → 1 (edge), colour: blue-white core → indigo edge
      const t = Math.min(Math.sqrt(x*x + z*z) / GAL_R, 1);
      const cr = t < 0.3 ? (0.85 + (0.55 - 0.85) * t / 0.3) : (0.55 + (0.4  - 0.55) * (t - 0.3) / 0.7);
      const cg = t < 0.3 ? (0.88 + (0.65 - 0.88) * t / 0.3) : (0.65 + (0.55 - 0.65) * (t - 0.3) / 0.7);
      const cb = t < 0.3 ? 1.0                               : (1.0  + (0.95 - 1.0)  * (t - 0.3) / 0.7);
      const dim = halo ? 0.35 : (0.4 + Math.random() * 0.6);
      const sz  = halo ? (0.003 + Math.random() * 0.006) : (0.004 + Math.random() * 0.018) * (1 - t * 0.4);

      stars.push({ x, y, z, cr, cg, cb, dim, sz });
    }

    // ── Mouse & rotation state ────────────────────────────────────────────
    let msx = -9999, msy = -9999, mpX = 0, mpY = 0;
    let rotX = 0.25, rotY = 0, tgtX = 0.25, tgtY = 0, autoY = 0;
    let last = 0;

    window.addEventListener('mousemove', e => {
      msx = e.clientX; msy = e.clientY;
      mpX =  e.clientX / window.innerWidth  - 0.5;
      mpY =  e.clientY / window.innerHeight - 0.5;
    });
    window.addEventListener('mouseleave', () => { msx = -9999; msy = -9999; });

    // ── Render loop ───────────────────────────────────────────────────────
    function frame(ts) {
      requestAnimationFrame(frame);
      const dt = Math.min(ts - last, 50); last = ts;

      autoY  += 0.00008 * dt;
      tgtX   += (-mpY * 0.28 - (tgtX - 0.25)) * 0.04;
      tgtY   += ( mpX * 0.35 - tgtY) * 0.04;
      rotX   += (tgtX - rotX) * 0.07;
      rotY   += (autoY + tgtY - rotY) * 0.07;

      const W = canvas.width, H = canvas.height;
      const cx = W * 0.5, cy = H * 0.5;
      const fov = Math.min(W, H) * 1.1;
      const camZ = 2.2;

      const sinX = Math.sin(rotX), cosX = Math.cos(rotX);
      const sinY = Math.sin(rotY), cosY = Math.cos(rotY);

      // Project stars into screen space
      const proj = [];
      for (const s of stars) {
        // Rotate Y then X
        const x1 =  s.x * cosY + s.z * sinY;
        const z1 = -s.x * sinY + s.z * cosY;
        const y2 =  s.y * cosX - z1 * sinX;
        const z2 =  s.y * sinX + z1 * cosX;
        const dz = camZ + z2;
        if (dz < 0.01) continue;
        const sc2 = fov / dz;
        proj.push({ sx: x1 * sc2 + cx, sy: y2 * sc2 + cy, sc: sc2, z: z2, s });
      }
      proj.sort((a, b) => a.z - b.z); // back to front

      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';

      const mRad = Math.min(W, H) * 0.28;

      for (const p of proj) {
        const { sx, sy, sc: scale, s } = p;
        const r = s.sz * scale;
        if (r < 0.15) continue;
        if (sx < -r || sx > W + r || sy < -r || sy > H + r) continue;

        const dx = sx - msx, dy = sy - msy;
        const boost = msx < 0 ? 0 : Math.max(0, 1 - Math.sqrt(dx*dx + dy*dy) / mRad);
        const bright = s.dim * (1 + boost * 4);
        const draw_r = r * (1 + boost * 1.5);

        ctx.globalAlpha = Math.min(1, bright);
        // Tint via compositing trick — draw white sprite then tint
        // Actually just draw with a colored gradient each time for large stars,
        // or use the white sprite + multiply. For simplicity: set fillStyle per star.
        const ri = Math.round(Math.min(255, s.cr * bright * 255));
        const gi = Math.round(Math.min(255, s.cg * bright * 255));
        const bi = Math.round(Math.min(255, s.cb * bright * 255));

        if (draw_r < 1.2) {
          // Tiny star: single pixel rect, fast
          ctx.fillStyle = `rgb(${ri},${gi},${bi})`;
          ctx.fillRect(sx - 0.5, sy - 0.5, 1, 1);
        } else {
          // Larger star: sprite scaled + tinted via globalAlpha on a colored canvas
          const d = draw_r * 2;
          ctx.drawImage(sprite, sx - draw_r, sy - draw_r, d, d);
        }
      }

      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    requestAnimationFrame(frame);
  })();

  document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
