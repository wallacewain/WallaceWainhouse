<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free JSON formatter and minifier. Paste JSON to pretty-print with 2 or 4 spaces, or minify it — runs entirely in your browser, nothing is sent to a server.">
  <title>JSON Formatter &mdash; Wallace Wainhouse</title>
  <link rel="canonical" href="https://wallacewainhouse.com/tools/json-formatter/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Wallace Wainhouse">
  <meta property="og:url" content="https://wallacewainhouse.com/tools/json-formatter/">
  <meta property="og:title" content="JSON Formatter &mdash; Wallace Wainhouse">
  <meta property="og:description" content="Free JSON formatter and minifier. Paste JSON to pretty-print with 2 or 4 spaces, or minify it — runs entirely in your browser, nothing is sent to a server.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="JSON Formatter &mdash; Wallace Wainhouse">
  <meta name="twitter:description" content="Free JSON formatter and minifier. Paste JSON to pretty-print with 2 or 4 spaces, or minify it — runs entirely in your browser, nothing is sent to a server.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .tool-wrap { display: flex; flex-direction: column; gap: 1rem; padding: 2rem 0 4rem; }
    textarea { font-family: var(--mono); font-size: 0.875rem; min-height: 240px; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .error-msg { color: #f87171; font-size: 0.85rem; }
    .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .output-header label { font-size: 0.85rem; font-weight: 500; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo"><svg viewBox="0 0 36 24" width="36" height="24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-label="WMW"><path d="M0,12 L6,0 L12,9 L18,2 L24,9 L30,0 L36,12 L30,24 L24,15 L18,22 L12,15 L6,24 Z"/></svg></a>
      <ul><li><a href="/">Home</a></li><li><a href="/tools/" class="active">Tools</a></li></ul>
    </nav>
  </header>
  <main>
    <section class="hero" style="padding-bottom:1.5rem">
      <h1>JSON Formatter</h1>
      <p>Format or minify JSON. Paste your JSON below &mdash; nothing is sent anywhere.</p>
    </section>
    <div class="tool-wrap">
      <div class="field"><label for="input">Input</label><textarea id="input" placeholder="Paste JSON here"></textarea></div>
      <div class="actions">
        <button class="btn" id="fmt2">Format (2 spaces)</button>
        <button class="btn" id="fmt4">Format (4 spaces)</button>
        <button class="btn" id="minify">Minify</button>
        <span class="error-msg" id="error"></span>
      </div>
      <div>
        <div class="output-header"><label>Output</label><button class="copy-btn" id="copy-btn">Copy</button></div>
        <textarea id="output" readonly placeholder="Output will appear here"></textarea>
      </div>
    </div>
  </main>
  <footer><p>&copy; <span id="yr"></span> Wallace Wainhouse</p></footer>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    const input  = document.getElementById('input');
    const output = document.getElementById('output');
    const errorEl = document.getElementById('error');
    function process(indent) {
      errorEl.textContent = '';
      try {
        const parsed = JSON.parse(input.value);
        output.value = indent === null ? JSON.stringify(parsed) : JSON.stringify(parsed, null, indent);
      } catch(e) { errorEl.textContent = e.message; output.value = ''; }
    }
    document.getElementById('fmt2').addEventListener('click', () => process(2));
    document.getElementById('fmt4').addEventListener('click', () => process(4));
    document.getElementById('minify').addEventListener('click', () => process(null));
    document.getElementById('copy-btn').addEventListener('click', () => {
      if (!output.value) return;
      navigator.clipboard.writeText(output.value);
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  </script>
</body>
</html>
