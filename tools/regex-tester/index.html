<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Regex tester — test regular expressions in your browser.">
  <title>Regex Tester &mdash; Wallace Wainhouse</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .tool-wrap { display: flex; flex-direction: column; gap: 1.25rem; padding: 2rem 0 4rem; }
    .pattern-row { display: flex; gap: 0.5rem; align-items: center; }
    .pattern-row input[type="text"] { flex: 1; font-family: var(--mono); }
    .flags { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .flag-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; cursor: pointer; }
    .match-display { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; font-family: var(--mono); font-size: 0.875rem; line-height: 1.8; word-break: break-word; min-height: 60px; white-space: pre-wrap; }
    .match-count { font-size: 0.85rem; color: var(--muted); }
    .match-count strong { color: var(--text); }
    .error-msg { color: #f87171; font-size: 0.85rem; }
    textarea { font-family: var(--mono); font-size: 0.875rem; min-height: 140px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">WW</a>
      <ul><li><a href="/">Home</a></li><li><a href="/tools/" class="active">Tools</a></li></ul>
    </nav>
  </header>
  <main>
    <section class="hero" style="padding-bottom:1.5rem">
      <h1>Regex Tester</h1>
      <p>Test regular expressions against a string. Your patterns and text stay in your browser.</p>
    </section>
    <div class="tool-wrap">
      <div class="field">
        <label>Pattern</label>
        <div class="pattern-row">
          <span style="color:var(--muted);font-family:var(--mono);font-size:1.1rem">/</span>
          <input type="text" id="pattern" placeholder="e.g. \d+" spellcheck="false">
          <span style="color:var(--muted);font-family:var(--mono);font-size:1.1rem">/</span>
        </div>
      </div>
      <div class="field">
        <label>Flags</label>
        <div class="flags">
          <label class="flag-row"><input type="checkbox" id="f-g" checked> g &mdash; global</label>
          <label class="flag-row"><input type="checkbox" id="f-i"> i &mdash; case insensitive</label>
          <label class="flag-row"><input type="checkbox" id="f-m"> m &mdash; multiline</label>
          <label class="flag-row"><input type="checkbox" id="f-s"> s &mdash; dot all</label>
        </div>
      </div>
      <div class="field"><label for="test-str">Test string</label><textarea id="test-str" placeholder="Enter test string here"></textarea></div>
      <div>
        <div style="margin-bottom:0.5rem;display:flex;justify-content:space-between;align-items:center">
          <span class="match-count" id="match-count"></span>
          <span class="error-msg" id="error"></span>
        </div>
        <div class="match-display" id="match-display"></div>
      </div>
    </div>
  </main>
  <footer><p>&copy; <span id="yr"></span> Wallace Wainhouse</p></footer>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    const patternEl = document.getElementById('pattern');
    const testEl    = document.getElementById('test-str');
    const display   = document.getElementById('match-display');
    const countEl   = document.getElementById('match-count');
    const errorEl   = document.getElementById('error');
    function getFlags() {
      return ['g','i','m','s'].filter(f => document.getElementById('f-'+f).checked).join('');
    }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function run() {
      const pattern = patternEl.value;
      const test    = testEl.value;
      errorEl.textContent = ''; countEl.textContent = ''; display.textContent = '';
      if (!pattern) { display.textContent = escHtml(test); return; }
      try {
        const flags = getFlags();
        const re = new RegExp(pattern, flags.includes('g') ? flags : flags + 'g');
        const matches = [...test.matchAll(re)];
        countEl.innerHTML = `<strong>${matches.length}</strong> match${matches.length !== 1 ? 'es' : ''}`;
        let html = '', last = 0;
        for (const m of matches) {
          if (m.index < last) continue;
          html += escHtml(test.slice(last, m.index));
          html += `<mark class="match-hl">${escHtml(m[0])}</mark>`;
          last = m.index + (m[0].length || 1);
        }
        html += escHtml(test.slice(last));
        display.innerHTML = html || '&nbsp;';
      } catch(e) { errorEl.textContent = e.message; display.textContent = escHtml(test); }
    }
    patternEl.addEventListener('input', run);
    testEl.addEventListener('input', run);
    ['f-g','f-i','f-m','f-s'].forEach(id => document.getElementById(id).addEventListener('change', run));
  </script>
</body>
</html>
