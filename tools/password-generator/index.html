<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free secure password generator. Uses cryptographically random values — no passwords are sent to any server. Configurable length and character sets.">
  <title>Password Generator &mdash; Wallace Wainhouse</title>
  <link rel="canonical" href="https://wallacewainhouse.com/tools/password-generator/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Wallace Wainhouse">
  <meta property="og:url" content="https://wallacewainhouse.com/tools/password-generator/">
  <meta property="og:title" content="Password Generator &mdash; Wallace Wainhouse">
  <meta property="og:description" content="Free secure password generator. Cryptographically random. Nothing sent to any server.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Password Generator &mdash; Wallace Wainhouse">
  <meta name="twitter:description" content="Free secure password generator. Cryptographically random. Nothing sent to any server.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <style>
    .tool-wrap{max-width:500px;display:flex;flex-direction:column;gap:1.25rem;padding:2rem 0 4rem}
    .pwd-row{display:flex;gap:.5rem;align-items:center}.pwd-row input{flex:1;font-family:var(--mono);font-size:1.05rem;letter-spacing:.04em}
    .checks{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}.check-row{display:flex;align-items:center;gap:.5rem;font-size:.9rem;cursor:pointer;user-select:none}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header><nav><a href="/" class="logo"><svg viewBox="0 0 36 24" width="36" height="24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-label="WMW"><path d="M0,12 L6,0 L12,9 L18,2 L24,9 L30,0 L36,12 L30,24 L24,15 L18,22 L12,15 L6,24 Z"/></svg></a><ul><li><a href="/">Home</a></li><li><a href="/tools/" class="active">Tools</a></li></ul></nav></header>
  <main>
    <section class="hero" style="padding-bottom:1.5rem"><h1>Password Generator</h1><p>Generates a random password in your browser. Nothing is sent anywhere.</p></section>
    <div class="tool-wrap">
      <div class="field"><label>Password</label><div class="pwd-row"><input type="text" id="output" readonly placeholder="Click Generate"><button class="copy-btn" id="copy-btn">Copy</button></div></div>
      <div class="field"><label>Length &mdash; <span id="length-val">16</span> characters</label><input type="range" id="length" min="8" max="64" value="16"></div>
      <div class="field"><label>Include</label><div class="checks">
        <label class="check-row"><input type="checkbox" id="upper" checked> Uppercase (A&ndash;Z)</label>
        <label class="check-row"><input type="checkbox" id="lower" checked> Lowercase (a&ndash;z)</label>
        <label class="check-row"><input type="checkbox" id="nums" checked> Numbers (0&ndash;9)</label>
        <label class="check-row"><input type="checkbox" id="syms" checked> Symbols (!@#&hellip;)</label>
      </div></div>
      <div><button class="btn" id="gen-btn">Generate</button></div>
    </div>
  </main>
  <footer><p>&copy; <span id="yr"></span> Wallace Wainhouse</p></footer>
  <script>
    document.getElementById('yr').textContent=new Date().getFullYear();
    const output=document.getElementById('output'),lengthEl=document.getElementById('length'),lengthVal=document.getElementById('length-val'),copyBtn=document.getElementById('copy-btn');
    const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ',LOWER='abcdefghijklmnopqrstuvwxyz',NUMS='0123456789',SYMS='!@#$%^&*()-_=+[]{}|;:,.<>?';
    const rand=n=>crypto.getRandomValues(new Uint32Array(1))[0]%n;
    function generate(){const sets=[['upper',UPPER],['lower',LOWER],['nums',NUMS],['syms',SYMS]].filter(([id])=>document.getElementById(id).checked).map(([,s])=>s);if(!sets.length){output.value='';return;}const pool=sets.join(''),len=parseInt(lengthEl.value),result=sets.map(s=>s[rand(s.length)]);while(result.length<len)result.push(pool[rand(pool.length)]);for(let i=result.length-1;i>0;i--){const j=rand(i+1);[result[i],result[j]]=[result[j],result[i]];}output.value=result.join('');}
    lengthEl.addEventListener('input',()=>{lengthVal.textContent=lengthEl.value;generate();});
    ['upper','lower','nums','syms'].forEach(id=>document.getElementById(id).addEventListener('change',generate));
    document.getElementById('gen-btn').addEventListener('click',generate);
    copyBtn.addEventListener('click',()=>{if(!output.value)return;navigator.clipboard.writeText(output.value);copyBtn.textContent='Copied!';setTimeout(()=>copyBtn.textContent='Copy',1500);});
    generate();
  </script>
<script src="/js/logo.js"></script>
</body>
</html>
