<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Maker</title>
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 1rem;
    }

    /* === LAYOUT === */
    .app-wrap {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 1.2rem;
      color: #16213e;
    }
    .panels {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .panel-left  { flex: 0 0 280px; }
    .panel-right { flex: 1; }

    /* === SECTION HEADINGS === */
    .section-title {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: .5rem;
    }

    /* === INGREDIENT INPUT === */
    #ing-search-wrap {
      margin-bottom: .6rem;
    }
    #ing-search {
      width: 100%;
      padding: .45rem .6rem;
      border: 1.5px solid #d0d4de;
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    #ing-search:focus { border-color: #4f8ef7; }
    #ing-suggestions {
      background: #fff;
      border: 1px solid #d0d4de;
      border-radius: 8px;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 2px;
      display: none;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .sug-item {
      padding: .4rem .7rem;
      cursor: pointer;
      font-size: .88rem;
    }
    .sug-item:hover { background: #f0f4ff; }
    #custom-ing-wrap {
      display: flex;
      gap: .4rem;
      margin-top: .5rem;
    }
    #custom-ing {
      flex: 1;
      padding: .4rem .6rem;
      border: 1.5px solid #d0d4de;
      border-radius: 8px;
      font-size: .85rem;
    }
    #custom-ing:focus { outline: none; border-color: #4f8ef7; }
    #add-custom-btn {
      padding: .4rem .75rem;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      white-space: nowrap;
    }
    #add-custom-btn:hover { background: #3a7de8; }

    /* === RECENT INGREDIENTS === */
    #recent-ings-wrap {
      margin-bottom: .8rem;
    }
    #recent-ings-list {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
    }
    .recent-chip {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      background: #eef3ff;
      border: 1px solid #c5d5f8;
      border-radius: 20px;
      padding: .18rem .55rem;
      font-size: .78rem;
      color: #2a5bd7;
      cursor: pointer;
      transition: background .15s;
    }
    .recent-chip:hover { background: #dce8ff; }

    /* === SELECTED INGREDIENTS === */
    #selected-ings {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-bottom: .8rem;
      min-height: 28px;
    }
    .ing-chip {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: #e8f0fe;
      border: 1px solid #b3c8fa;
      border-radius: 20px;
      padding: .2rem .6rem;
      font-size: .82rem;
      color: #1a56db;
    }
    .ing-chip .remove {
      cursor: pointer;
      font-size: .9rem;
      line-height: 1;
      color: #5a80d4;
    }
    .ing-chip .remove:hover { color: #c0392b; }

    /* === GENERATE BUTTON === */
    #generate-btn {
      width: 100%;
      padding: .6rem;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      margin-bottom: .8rem;
    }
    #generate-btn:hover { opacity: .9; }
    #generate-btn:disabled { opacity: .55; cursor: default; }

    /* === OPTIONS === */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
    }
    .opt-group label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: #555;
      margin-bottom: .2rem;
    }
    .opt-group select,
    .opt-group input[type=number] {
      width: 100%;
      padding: .35rem .5rem;
      border: 1.5px solid #d0d4de;
      border-radius: 7px;
      font-size: .85rem;
      background: #fafbff;
    }
    .opt-group select:focus,
    .opt-group input[type=number]:focus { outline: none; border-color: #4f8ef7; }
    .full-width { grid-column: 1 / -1; }

    /* === STATUS === */
    #status {
      font-size: .82rem;
      color: #666;
      min-height: 1.1rem;
      margin-top: .4rem;
      text-align: center;
    }

    /* === RECIPE DISPLAY === */
    #recipe-out {
      min-height: 200px;
    }
    .recipe-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: .6rem;
    }
    .recipe-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #16213e;
    }
    .recipe-meta {
      font-size: .8rem;
      color: #777;
      margin-top: .15rem;
    }
    .copy-btn {
      padding: .35rem .75rem;
      background: #f0f4ff;
      border: 1px solid #b3c8fa;
      border-radius: 8px;
      font-size: .8rem;
      cursor: pointer;
      color: #2a5bd7;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #dce8ff; }
    .recipe-section-title {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #888;
      margin: .8rem 0 .35rem;
    }
    /* ingredients list */
    .ing-list {
      list-style: none;
    }
    .ing-list li {
      display: flex;
      align-items: baseline;
      gap: .4rem;
      padding: .25rem 0;
      font-size: .9rem;
      border-bottom: 1px solid #f0f2f5;
    }
    .ing-list li:last-child { border-bottom: none; }
    .ing-amount { font-weight: 600; min-width: 60px; color: #333; }
    .ing-name   { color: #444; }
    .ing-note   { font-size: .78rem; color: #888; font-style: italic; }
    /* steps list */
    .step-list {
      list-style: none;
      counter-reset: steps;
    }
    .step-item {
      counter-increment: steps;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .5rem;
      margin-bottom: .75rem;
      align-items: start;
    }
    .step-num {
      background: #4f8ef7;
      color: #fff;
      border-radius: 50%;
      width: 1.6rem;
      height: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .78rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: .1rem;
    }
    .step-text { font-size: .9rem; line-height: 1.5; }
    .step-additions {
      grid-column: 2;
      margin-top: .4rem;
    }
    .addition-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: #f8f9ff;
      border: 1px solid #dde4fa;
      border-radius: 8px;
      padding: .3rem .6rem;
      margin-bottom: .3rem;
      font-size: .82rem;
    }
    .addition-timer-btn {
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .15rem .45rem;
      font-size: .75rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .addition-timer-btn.running {
      background: #e74c3c;
    }
    .addition-timer-btn:hover { opacity: .85; }
    .addition-label { flex: 1; }
    /* tip box */
    .tip-box {
      background: #fffbeb;
      border: 1px solid #f6d860;
      border-radius: 8px;
      padding: .6rem .8rem;
      font-size: .85rem;
      color: #7a6000;
      margin-top: .5rem;
    }
    /* photos section */
    .photos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: .5rem;
    }
    .photo-card {
      background: #f8f9ff;
      border: 1px solid #dde4fa;
      border-radius: 10px;
      padding: .5rem;
      width: calc(50% - .25rem);
      font-size: .8rem;
    }
    .photo-card img {
      width: 100%;
      border-radius: 6px;
      display: block;
      margin-bottom: .3rem;
    }
    .photo-card .photo-caption {
      color: #555;
      font-size: .75rem;
    }

    /* === TIMER OVERLAY === */
    #timer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #timer-overlay.active { display: flex; }
    #timer-box {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      min-width: 280px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    #timer-label {
      font-size: 1rem;
      color: #555;
      margin-bottom: .5rem;
    }
    #timer-display {
      font-size: 3rem;
      font-weight: 700;
      color: #16213e;
      font-variant-numeric: tabular-nums;
      letter-spacing: .05em;
    }
    #timer-close {
      margin-top: 1rem;
      padding: .5rem 1.5rem;
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      cursor: pointer;
    }
    #timer-close:hover { opacity: .88; }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      .panels { flex-direction: column; }
      .panel-left { flex: none; width: 100%; }
      .photo-card { width: 100%; }
    }
  </style>
</head>
<body>
<div class="app-wrap">
  <h1>Recipe Maker</h1>

  <div class="panels">
    <!-- LEFT PANEL: inputs -->
    <div class="panel panel-left">

      <!-- Ingredient search -->
      <div class="section-title">Ingredients</div>
      <div id="ing-search-wrap">
        <input id="ing-search" type="text" placeholder="Search ingredients…" autocomplete="off" />
        <div id="ing-suggestions"></div>
      </div>
      <div id="custom-ing-wrap">
        <input id="custom-ing" type="text" placeholder="Custom ingredient…" />
        <button id="add-custom-btn">+ Add</button>
      </div>

      <!-- Recent ingredients -->
      <div id="recent-ings-wrap" style="margin-top:.8rem;">
        <div class="section-title">Recent</div>
        <div id="recent-ings-list"></div>
      </div>

      <!-- Selected chips -->
      <div id="selected-ings" style="margin-top:.6rem;"></div>

      <hr style="margin:.6rem 0; border:none; border-top:1px solid #eee;" />

      <!-- Options -->
      <div class="section-title">Options</div>
      <div class="options-grid">
        <div class="opt-group">
          <label>Cuisine</label>
          <select id="opt-cuisine">
            <option value="any">Any</option>
            <option value="italian">Italian</option>
            <option value="asian">Asian</option>
            <option value="mexican">Mexican</option>
            <option value="mediterranean">Mediterranean</option>
            <option value="american">American</option>
            <option value="indian">Indian</option>
            <option value="french">French</option>
          </select>
        </div>
        <div class="opt-group">
          <label>Meal type</label>
          <select id="opt-meal">
            <option value="any">Any</option>
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="snack">Snack</option>
            <option value="dessert">Dessert</option>
          </select>
        </div>
        <div class="opt-group">
          <label>Servings</label>
          <input id="opt-servings" type="number" min="1" max="20" value="2" />
        </div>
        <div class="opt-group">
          <label>Max time (min)</label>
          <input id="opt-time" type="number" min="5" max="300" value="60" />
        </div>
        <div class="opt-group full-width">
          <label>Dietary</label>
          <select id="opt-diet">
            <option value="none">None</option>
            <option value="vegetarian">Vegetarian</option>
            <option value="vegan">Vegan</option>
            <option value="gluten-free">Gluten-free</option>
            <option value="dairy-free">Dairy-free</option>
            <option value="keto">Keto</option>
            <option value="paleo">Paleo</option>
          </select>
        </div>
      </div>

      <button id="generate-btn" style="margin-top:.8rem;">Generate Recipe</button>
      <div id="status"></div>
    </div>

    <!-- RIGHT PANEL: recipe -->
    <div class="panel panel-right">
      <div id="recipe-out">
        <p style="color:#aaa; text-align:center; padding:3rem 0;">Your recipe will appear here.</p>
      </div>
    </div>
  </div>
</div>

<!-- Timer overlay -->
<div id="timer-overlay">
  <div id="timer-box">
    <div id="timer-label">Timer</div>
    <div id="timer-display">00:00</div>
    <button id="timer-close">Stop &amp; Close</button>
  </div>
</div>

<script>
  // =====================================================================
  // DATA
  // =====================================================================
  const INGREDIENTS = [
    'chicken breast','chicken thighs','ground beef','ground turkey','salmon','shrimp','tofu','eggs',
    'bacon','sausage','pork chops','lamb','tuna','cod','tilapia','duck','turkey breast',
    'white rice','brown rice','pasta','spaghetti','penne','fettuccine','quinoa','couscous',
    'bread','flour','cornmeal','oats','barley','lentils','black beans','chickpeas','kidney beans',
    'potato','sweet potato','tomato','onion','garlic','bell pepper','spinach','broccoli',
    'carrot','celery','zucchini','eggplant','mushroom','kale','cabbage','cauliflower',
    'cucumber','lettuce','arugula','corn','peas','asparagus','green beans','beets',
    'apple','banana','lemon','lime','orange','avocado','strawberry','blueberry',
    'cheddar cheese','mozzarella','parmesan','feta','cream cheese','butter','milk','heavy cream',
    'olive oil','vegetable oil','soy sauce','fish sauce','hot sauce','sriracha',
    'salt','black pepper','cumin','paprika','turmeric','oregano','basil','thyme',
    'rosemary','cilantro','parsley','ginger','chili flakes','cinnamon','nutmeg',
    'chicken broth','vegetable broth','tomato paste','canned tomatoes','coconut milk',
    'honey','maple syrup','sugar','brown sugar','vinegar','balsamic vinegar','dijon mustard',
    'peanut butter','tahini','sesame oil','rice vinegar','oyster sauce','hoisin sauce',
    'almonds','walnuts','pine nuts','cashews','pumpkin seeds','sunflower seeds',
  ];

  const RECENT_KEY = 'recipeMaker_recentIngs';
  const MAX_RECENT = 12;

  function loadRecent() {
    try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); }
    catch { return []; }
  }
  function saveRecent(list) {
    localStorage.setItem(RECENT_KEY, JSON.stringify(list));
  }
  function addToRecent(ings) {
    let recent = loadRecent();
    ings.forEach(ing => {
      recent = recent.filter(r => r !== ing);
      recent.unshift(ing);
    });
    recent = recent.slice(0, MAX_RECENT);
    saveRecent(recent);
  }

  // =====================================================================
  // STATE
  // =====================================================================
  let selectedIngs = [];
  let activeTimerInterval = null;
  let activeTimerBtn = null;

  // =====================================================================
  // UI HELPERS
  // =====================================================================
  const $ = id => document.getElementById(id);

  function renderSelectedChips() {
    const wrap = $('selected-ings');
    wrap.innerHTML = '';
    selectedIngs.forEach(ing => {
      const chip = document.createElement('span');
      chip.className = 'ing-chip';
      chip.innerHTML = `${ing} <span class="remove" data-ing="${ing}">×</span>`;
      chip.querySelector('.remove').addEventListener('click', () => {
        selectedIngs = selectedIngs.filter(i => i !== ing);
        renderSelectedChips();
      });
      wrap.appendChild(chip);
    });
  }

  function renderRecentChips() {
    const list = $('recent-ings-list');
    const recent = loadRecent();
    list.innerHTML = '';
    if (!recent.length) {
      $('recent-ings-wrap').style.display = 'none';
      return;
    }
    $('recent-ings-wrap').style.display = '';
    recent.forEach(ing => {
      const chip = document.createElement('span');
      chip.className = 'recent-chip';
      chip.textContent = ing;
      chip.title = 'Add ' + ing;
      chip.addEventListener('click', () => addIngredient(ing));
      list.appendChild(chip);
    });
  }

  function addIngredient(ing) {
    ing = ing.trim();
    if (!ing || selectedIngs.includes(ing)) return;
    selectedIngs.push(ing);
    renderSelectedChips();
  }

  // =====================================================================
  // SEARCH / AUTOCOMPLETE
  // =====================================================================
  function toggleSearchWrap(visible) {
    const wrap = document.getElementById('ing-search-wrap');
    const visible2 = wrap.style.display !== 'none';
    wrap.style.display = visible ? '' : 'none';
  }

  const searchInput   = $('ing-search');
  const suggestionsEl = $('ing-suggestions');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    suggestionsEl.innerHTML = '';
    if (!q) { suggestionsEl.style.display = 'none'; return; }
    const matches = INGREDIENTS.filter(i => i.includes(q)).slice(0, 8);
    if (!matches.length) { suggestionsEl.style.display = 'none'; return; }
    matches.forEach(m => {
      const div = document.createElement('div');
      div.className = 'sug-item';
      div.textContent = m;
      div.addEventListener('click', () => {
        addIngredient(m);
        searchInput.value = '';
        suggestionsEl.style.display = 'none';
      });
      suggestionsEl.appendChild(div);
    });
    suggestionsEl.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!suggestionsEl.contains(e.target) && e.target !== searchInput) {
      suggestionsEl.style.display = 'none';
    }
  });

  // =====================================================================
  // CUSTOM INGREDIENT
  // =====================================================================
  $('add-custom-btn').addEventListener('click', () => {
    addIngredient($('custom-ing').value);
    $('custom-ing').value = '';
  });
  $('custom-ing').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      addIngredient($('custom-ing').value);
      $('custom-ing').value = '';
    }
  });

  // =====================================================================
  // TIMER
  // =====================================================================
  function startTimer(seconds, label, btn) {
    // stop any existing timer
    if (activeTimerInterval) {
      clearInterval(activeTimerInterval);
      activeTimerInterval = null;
      if (activeTimerBtn) {
        activeTimerBtn.textContent = activeTimerBtn.dataset.origText;
        activeTimerBtn.classList.remove('running');
      }
    }
    if (btn === activeTimerBtn && btn) {
      // toggled off
      activeTimerBtn = null;
      $('timer-overlay').classList.remove('active');
      return;
    }

    activeTimerBtn = btn;
    if (btn) {
      btn.dataset.origText = btn.dataset.origText || btn.textContent;
      btn.classList.add('running');
    }

    let remaining = seconds;
    const overlay = $('timer-overlay');
    const display = $('timer-display');
    $('timer-label').textContent = label || 'Timer';
    overlay.classList.add('active');

    function tick() {
      const m = Math.floor(remaining / 60).toString().padStart(2, '0');
      const s = (remaining % 60).toString().padStart(2, '0');
      display.textContent = `${m}:${s}`;
      if (remaining <= 0) {
        clearInterval(activeTimerInterval);
        activeTimerInterval = null;
        display.textContent = '⏰ Done!';
        if (btn) { btn.textContent = btn.dataset.origText; btn.classList.remove('running'); }
        activeTimerBtn = null;
      }
      remaining--;
    }
    tick();
    activeTimerInterval = setInterval(tick, 1000);
  }

  $('timer-close').addEventListener('click', () => {
    if (activeTimerInterval) clearInterval(activeTimerInterval);
    activeTimerInterval = null;
    if (activeTimerBtn) {
      activeTimerBtn.textContent = activeTimerBtn.dataset.origText;
      activeTimerBtn.classList.remove('running');
      activeTimerBtn = null;
    }
    $('timer-overlay').classList.remove('active');
  });

  // =====================================================================
  // PROMPT BUILDER
  // =====================================================================
  function buildPrompt() {
    const ings     = selectedIngs.join(', ') || 'pantry staples';
    const cuisine  = $('opt-cuisine').value;
    const meal     = $('opt-meal').value;
    const servings = $('opt-servings').value;
    const maxTime  = $('opt-time').value;
    const diet     = $('opt-diet').value;

    return `You are a professional chef. Create a detailed recipe using these ingredients: ${ings}.

Constraints:
- Cuisine: ${cuisine === 'any' ? 'any style' : cuisine}
- Meal type: ${meal === 'any' ? 'any' : meal}
- Servings: ${servings}
- Total time: at most ${maxTime} minutes
- Dietary: ${diet === 'none' ? 'no restrictions' : diet}

Respond ONLY with a JSON object matching this schema (no markdown, no extra text):
{
  "name": "Recipe name",
  "description": "One-sentence description",
  "servings": ${servings},
  "prepTime": 10,
  "cookTime": 30,
  "ingredients": [
    {"amount": "2", "unit": "cups", "name": "flour", "note": "sifted"}
  ],
  "steps": [
    {
      "text": "Heat the pan over medium heat.",
      "additions": [
        {"label": "Add butter", "afterMinutes": 2}
      ]
    },
    {"text": "Add vegetables and stir-fry for 5 minutes.", "additions": []}
  ],
  "tips": "One helpful tip."
}

Rules:
- Every step object MUST have an \"additions\" array (empty [] if nothing to add mid-step).
- Use \"additions\" only when a timed mid-step addition genuinely improves the dish (e.g. adding garlic 2 minutes after oil heats).
- afterMinutes must be a positive integer (minutes after the step starts).
- note field is optional.
- Respond with valid JSON only.`;
  }

  // =====================================================================
  // RECIPE RENDERER
  // =====================================================================
  function renderRecipe(recipe) {
    const out = $('recipe-out');

    // header
    const header = document.createElement('div');
    header.className = 'recipe-header';
    header.innerHTML = `
      <div>
        <div class="recipe-title">${esc(recipe.name)}</div>
        <div class="recipe-meta">${esc(recipe.description)} • ${recipe.servings} serving${recipe.servings !== 1 ? 's' : ''} • Prep ${recipe.prepTime}m / Cook ${recipe.cookTime}m</div>
      </div>
      <button class="copy-btn" id="copy-btn">Copy recipe</button>`;
    out.appendChild(header);

    // ingredients
    const ingTitle = document.createElement('div');
    ingTitle.className = 'recipe-section-title';
    ingTitle.textContent = 'Ingredients';
    out.appendChild(ingTitle);

    const ingList = document.createElement('ul');
    ingList.className = 'ing-list';
    recipe.ingredients.forEach(i => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="ing-amount">${esc(i.amount)} ${esc(i.unit || '')}</span><span class="ing-name">${esc(i.name)}</span>${i.note ? `<span class="ing-note">(${esc(i.note)})</span>` : ''}`;
      ingList.appendChild(li);
    });
    out.appendChild(ingList);

    // steps
    const stepsTitle = document.createElement('div');
    stepsTitle.className = 'recipe-section-title';
    stepsTitle.textContent = 'Instructions';
    out.appendChild(stepsTitle);

    const stepList = document.createElement('ol');
    stepList.className = 'step-list';

    recipe.steps.forEach((step, idx) => {
      const li = document.createElement('li');
      li.className = 'step-item';

      const numEl = document.createElement('div');
      numEl.className = 'step-num';
      numEl.textContent = idx + 1;

      const bodyEl = document.createElement('div');
      bodyEl.className = 'step-text';
      bodyEl.textContent = step.text;

      li.appendChild(numEl);
      li.appendChild(bodyEl);

      // mid-step additions
      if (Array.isArray(step.additions) && step.additions.length > 0) {
        const addWrap = document.createElement('div');
        addWrap.className = 'step-additions';
        step.additions.forEach(addition => {
          const addEl = document.createElement('div');
          addEl.className = 'addition-item';
          const mins = addition.afterMinutes;
          const timerSec = mins * 60;
          const timerLabel = `Step ${idx+1}: ${addition.label}`;
          const timerBtn = document.createElement('button');
          timerBtn.className = 'addition-timer-btn';
          timerBtn.textContent = `⏱ ${mins}m timer`;
          timerBtn.addEventListener('click', () => startTimer(timerSec, timerLabel, timerBtn));
          const labelEl = document.createElement('span');
          labelEl.className = 'addition-label';
          labelEl.textContent = `After ${mins} min: ${addition.label}`;
          addEl.appendChild(timerBtn);
          addEl.appendChild(labelEl);
          addWrap.appendChild(addEl);
        });
        li.appendChild(addWrap);
      }

      stepList.appendChild(li);
    });
    out.appendChild(stepList);

    // tip
    if (recipe.tips) {
      const tipBox = document.createElement('div');
      tipBox.className = 'tip-box';
      tipBox.innerHTML = `<strong>Tip:</strong> ${esc(recipe.tips)}`;
      out.appendChild(tipBox);
    }

    // copy button
    document.getElementById('copy-btn').addEventListener('click', () => {
      const text = recipeToText(recipe);
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy recipe', 2000);
      });
    });
  }

  function recipeToText(r) {
    let out = `${r.name}\n${r.description}\nServings: ${r.servings} | Prep: ${r.prepTime}m | Cook: ${r.cookTime}m\n\nINGREDIENTS\n`;
    r.ingredients.forEach(i => {
      out += `- ${i.amount} ${i.unit || ''} ${i.name}${i.note ? ' (' + i.note + ')' : ''}\n`;
    });
    out += '\nINSTRUCTIONS\n';
    r.steps.forEach((s, idx) => {
      out += `${idx+1}. ${s.text}\n`;
      if (Array.isArray(s.additions)) s.additions.forEach(a => {
        out += `   [After ${a.afterMinutes} min: ${a.label}]\n`;
      });
    });
    if (r.tips) out += `\nTIP: ${r.tips}\n`;
    return out;
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // =====================================================================
  // PHOTOS (placeholder — no real image API used)
  // =====================================================================
  function renderRecPhotos() {
    // Intentionally left minimal; extend with a real image API if desired.
  }

  // =====================================================================
  // TIPS (placeholder)
  // =====================================================================
  function renderRecipeTips() { /* tips already embedded in recipe JSON */ }
  function renderRecStepsDone() { /* step done-state tracking placeholder */ }

  // =====================================================================
  // GENERATE
  // =====================================================================
  $('generate-btn').addEventListener('click', async () => {
    if (selectedIngs.length === 0) {
      $('status').textContent = 'Please add at least one ingredient.';
      return;
    }

    $('generate-btn').disabled = true;
    $('status').textContent = 'Generating recipe…';
    $('recipe-out').innerHTML = '';

    try {
      const prompt = buildPrompt();

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': window.ANTHROPIC_API_KEY || '',
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 2048,
          messages: [{ role: 'user', content: prompt }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const raw  = data.content?.[0]?.text || '';

      // strip possible markdown fences
      const cleaned = raw.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
      const recipe = JSON.parse(cleaned);

      // persist ingredients to recent
      addToRecent(selectedIngs);
      renderRecentChips();

      renderRecipe(recipe);
      $('status').textContent = '';
    } catch (err) {
      $('recipe-out').innerHTML = `<p style="color:#c0392b;">Error: ${esc(err.message)}</p>`;
      $('status').textContent = '';
    } finally {
      $('generate-btn').disabled = false;
    }
  });

  // =====================================================================
  // INIT
  // =====================================================================
  (function init() {
    renderRecentChips();
    // Legacy stubs kept for forward-compat if called from outside
    if (typeof renderRecipeTips === 'function') renderRecipeTips();
    if (typeof renderRecStepsDone === 'function') { renderRecipeTips(); renderRecStepsDone(); }
    renderRecPhotos();

  })();
  </script>
</body>
