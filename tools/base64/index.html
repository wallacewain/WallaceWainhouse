<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free Base64 encoder and decoder. Encode text or files to Base64, or decode Base64 strings back to text. Runs entirely in your browser.">
  <title>Base64 Encoder / Decoder &mdash; Wallace Wainhouse</title>
  <link rel="canonical" href="https://wallacewainhouse.com/tools/base64/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Wallace Wainhouse">
  <meta property="og:url" content="https://wallacewainhouse.com/tools/base64/">
  <meta property="og:title" content="Base64 Encoder / Decoder &mdash; Wallace Wainhouse">
  <meta property="og:description" content="Free Base64 encoder and decoder. Runs entirely in your browser.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Base64 Encoder / Decoder &mdash; Wallace Wainhouse">
  <meta name="twitter:description" content="Free Base64 encoder and decoder. Runs entirely in your browser.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <style>
    .tool-wrap{display:flex;flex-direction:column;gap:1.25rem;padding:2rem 0 4rem}
    .actions{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
    .output-header{display:flex;justify-content:space-between;align-items:center}
    .error-msg{color:#f87171;font-size:.85rem}
    textarea{font-family:var(--mono);font-size:.875rem;min-height:160px}
    .file-section{display:flex;flex-direction:column;gap:.75rem;padding-top:1rem;border-top:1px solid var(--border)}
    .file-section label{font-size:.85rem;font-weight:500;color:var(--muted)}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header><nav><a href="/" class="logo"><svg viewBox="0 0 36 24" width="36" height="24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-label="WMW"><path d="M0,12 L6,0 L12,9 L18,2 L24,9 L30,0 L36,12 L30,24 L24,15 L18,22 L12,15 L6,24 Z"/></svg></a><ul><li><a href="/">Home</a></li><li><a href="/tools/" class="active">Tools</a></li></ul></nav></header>
  <main>
    <section class="hero" style="padding-bottom:1.5rem"><h1>Base64 Encoder / Decoder</h1><p>Encode or decode Base64 text or files. Runs in your browser.</p></section>
    <div class="tool-wrap">
      <div class="field"><label for="input">Input</label><textarea id="input" placeholder="Enter text to encode or Base64 to decode"></textarea></div>
      <div class="actions"><button class="btn" id="encode-btn">Encode</button><button class="btn" id="decode-btn">Decode</button><span class="error-msg" id="error"></span></div>
      <div class="field"><div class="output-header"><label>Output</label><button class="copy-btn" id="copy-btn">Copy</button></div><textarea id="output" readonly placeholder="Output will appear here"></textarea></div>
      <div class="file-section"><label>Or convert a file to Base64</label><input type="file" id="file-input" style="background:none;border:none;padding:0;font-size:.9rem;color:var(--text);width:auto"><textarea id="file-output" readonly placeholder="File Base64 will appear here" style="min-height:80px"></textarea></div>
    </div>
  </main>
  <footer><p>&copy; <span id="yr"></span> Wallace Wainhouse</p></footer>
  <script>
    document.getElementById('yr').textContent=new Date().getFullYear();
    const input=document.getElementById('input'),output=document.getElementById('output'),errorEl=document.getElementById('error'),copyBtn=document.getElementById('copy-btn');
    function toB64(str){return btoa(unescape(encodeURIComponent(str)));}
    function fromB64(str){try{return decodeURIComponent(escape(atob(str.trim())));}catch{throw new Error('Invalid Base64 input');}}
    document.getElementById('encode-btn').addEventListener('click',()=>{errorEl.textContent='';try{output.value=toB64(input.value);}catch(e){errorEl.textContent=e.message;}});
    document.getElementById('decode-btn').addEventListener('click',()=>{errorEl.textContent='';try{output.value=fromB64(input.value);}catch(e){errorEl.textContent=e.message;}});
    copyBtn.addEventListener('click',()=>{if(!output.value)return;navigator.clipboard.writeText(output.value);copyBtn.textContent='Copied!';setTimeout(()=>copyBtn.textContent='Copy',1500);});
    document.getElementById('file-input').addEventListener('change',function(){const file=this.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>document.getElementById('file-output').value=e.target.result.split(',')[1];reader.readAsDataURL(file);});
  </script>
<script src="/js/logo.js"></script>
</body>
</html>
