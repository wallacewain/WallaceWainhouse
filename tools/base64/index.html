<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Base64 encoder and decoder — runs in your browser.">
  <title>Base64 Encoder / Decoder &mdash; Wallace Wainhouse</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .tool-wrap { display: flex; flex-direction: column; gap: 1.25rem; padding: 2rem 0 4rem; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .output-header { display: flex; justify-content: space-between; align-items: center; }
    .error-msg { color: #f87171; font-size: 0.85rem; }
    textarea { font-family: var(--mono); font-size: 0.875rem; min-height: 160px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0.5rem 0; }
    .file-section { display: flex; flex-direction: column; gap: 0.75rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .file-section label { font-size: 0.85rem; font-weight: 500; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">WW</a>
      <ul><li><a href="/">Home</a></li><li><a href="/tools/" class="active">Tools</a></li></ul>
    </nav>
  </header>
  <main>
    <section class="hero" style="padding-bottom:1.5rem">
      <h1>Base64 Encoder / Decoder</h1>
      <p>Encode or decode Base64 text or files. Runs in your browser.</p>
    </section>
    <div class="tool-wrap">
      <div class="field"><label for="input">Input</label><textarea id="input" placeholder="Enter text to encode or Base64 to decode"></textarea></div>
      <div class="actions">
        <button class="btn" id="encode-btn">Encode</button>
        <button class="btn" id="decode-btn">Decode</button>
        <span class="error-msg" id="error"></span>
      </div>
      <div class="field">
        <div class="output-header"><label>Output</label><button class="copy-btn" id="copy-btn">Copy</button></div>
        <textarea id="output" readonly placeholder="Output will appear here"></textarea>
      </div>
      <div class="file-section">
        <label>Or convert a file to Base64</label>
        <input type="file" id="file-input" style="background:none;border:none;padding:0;font-size:0.9rem;color:var(--text);width:auto">
        <textarea id="file-output" readonly placeholder="File Base64 will appear here" style="min-height:80px"></textarea>
      </div>
    </div>
  </main>
  <footer><p>&copy; <span id="yr"></span> Wallace Wainhouse</p></footer>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const errorEl = document.getElementById('error');
    const copyBtn = document.getElementById('copy-btn');
    function toB64(str) { return btoa(unescape(encodeURIComponent(str))); }
    function fromB64(str) {
      try { return decodeURIComponent(escape(atob(str.trim()))); }
      catch { throw new Error('Invalid Base64 input'); }
    }
    document.getElementById('encode-btn').addEventListener('click', () => {
      errorEl.textContent = '';
      try { output.value = toB64(input.value); } catch(e) { errorEl.textContent = e.message; }
    });
    document.getElementById('decode-btn').addEventListener('click', () => {
      errorEl.textContent = '';
      try { output.value = fromB64(input.value); } catch(e) { errorEl.textContent = e.message; }
    });
    copyBtn.addEventListener('click', () => {
      if (!output.value) return;
      navigator.clipboard.writeText(output.value);
      copyBtn.textContent = 'Copied!'; setTimeout(() => copyBtn.textContent = 'Copy', 1500);
    });
    document.getElementById('file-input').addEventListener('change', function() {
      const file = this.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { document.getElementById('file-output').value = e.target.result.split(',')[1]; };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
