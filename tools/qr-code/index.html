<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free QR code generator — no ads, no tracking. Generate a QR code from any text or URL and download as PNG. Runs entirely in your browser.">
  <title>QR Code Generator &mdash; Wallace Wainhouse</title>
  <link rel="canonical" href="https://wallacewainhouse.com/tools/qr-code/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Wallace Wainhouse">
  <meta property="og:url" content="https://wallacewainhouse.com/tools/qr-code/">
  <meta property="og:title" content="QR Code Generator &mdash; Wallace Wainhouse">
  <meta property="og:description" content="Free QR code generator. No ads, no tracking. Runs entirely in your browser.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="QR Code Generator &mdash; Wallace Wainhouse">
  <meta name="twitter:description" content="Free QR code generator. No ads, no tracking. Runs entirely in your browser.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <style>
    .tool-layout { display: grid; grid-template-columns: 360px 1fr; gap: 3rem; align-items: start; padding: 2rem 0 4rem; }
    .controls { display: flex; flex-direction: column; gap: 1.25rem; }
    .qr-output { display: flex; flex-direction: column; gap: 1rem; }
    #qr { border-radius: var(--radius); display: block; image-rendering: pixelated; }
    .qr-placeholder { width: 256px; height: 256px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.85rem; }
    @media (max-width: 720px) { .tool-layout { grid-template-columns: 1fr; gap: 2rem; } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header><nav><a href="/" class="logo"><svg viewBox="0 0 36 24" width="36" height="24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-label="WMW"><path d="M0,12 L6,0 L12,9 L18,2 L24,9 L30,0 L36,12 L30,24 L24,15 L18,22 L12,15 L6,24 Z"/></svg></a><ul><li><a href="/">Home</a></li><li><a href="/tools/" class="active">Tools</a></li></ul></nav></header>
  <main>
    <section class="hero" style="padding-bottom:1.5rem">
      <h1>QR Code Generator</h1>
      <p>Generates a QR code from any text or URL. Runs in your browser &mdash; nothing is sent anywhere.</p>
    </section>
    <div class="tool-layout">
      <div class="controls">
        <div class="field"><label for="qr-input">Text or URL</label><textarea id="qr-input" placeholder="https://example.com"></textarea></div>
        <div class="row">
          <div class="field"><label for="qr-size">Output size</label><select id="qr-size"><option value="128">128 px</option><option value="256" selected>256 px</option><option value="512">512 px</option><option value="1024">1024 px</option></select></div>
          <div class="field"><label for="qr-level">Error correction</label><select id="qr-level"><option value="L">L &mdash; 7%</option><option value="M" selected>M &mdash; 15%</option><option value="Q">Q &mdash; 25%</option><option value="H">H &mdash; 30%</option></select></div>
        </div>
        <button class="btn" id="download-btn" disabled>Download PNG</button>
      </div>
      <div class="qr-output">
        <canvas id="qr" style="display:none"></canvas>
        <div class="qr-placeholder" id="qr-placeholder">Enter text to generate</div>
      </div>
    </div>
  </main>
  <footer><p>&copy; <span id="yr"></span> Wallace Wainhouse</p></footer>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    const input=document.getElementById('qr-input'),sizeSelect=document.getElementById('qr-size'),levelSelect=document.getElementById('qr-level'),canvas=document.getElementById('qr'),placeholder=document.getElementById('qr-placeholder'),downloadBtn=document.getElementById('download-btn');
    let qr=null,timer=null;
    function generate(){const value=input.value.trim();if(!value){canvas.style.display='none';placeholder.style.display='flex';downloadBtn.disabled=true;return;}const size=parseInt(sizeSelect.value),level=levelSelect.value;if(!qr)qr=new QRious({element:canvas,value,size,level});else qr.set({value,size,level});const d=Math.min(size,256);canvas.style.width=d+'px';canvas.style.height=d+'px';canvas.style.display='block';placeholder.style.display='none';downloadBtn.disabled=false;}
    input.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(generate,200);});
    sizeSelect.addEventListener('change',generate);levelSelect.addEventListener('change',generate);
    downloadBtn.addEventListener('click',()=>{if(!input.value.trim())return;const a=document.createElement('a');a.download='qrcode.png';a.href=canvas.toDataURL('image/png');a.click();});
  </script>
<script src="/js/logo.js"></script>
</body>
</html>
