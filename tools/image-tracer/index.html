<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Trace RGB images to clean SVG vectors in your browser. Adjust palette size, smoothing, and noise suppression. No upload required.">
  <title>Image Tracer &mdash; Wallace Wainhouse</title>
  <link rel="canonical" href="https://wallacewainhouse.com/tools/image-tracer/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Wallace Wainhouse">
  <meta property="og:url" content="https://wallacewainhouse.com/tools/image-tracer/">
  <meta property="og:title" content="Image Tracer &mdash; Wallace Wainhouse">
  <meta property="og:description" content="Trace RGB images to SVG vectors in your browser.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Image Tracer &mdash; Wallace Wainhouse">
  <meta name="twitter:description" content="Trace RGB images to SVG vectors in your browser.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    .tool-wrap { max-width: 900px; display: flex; flex-direction: column; gap: 1.25rem; padding-bottom: 4rem; }

    .preview-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .preview-pane { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-height: 200px; display: flex; align-items: center; justify-content: center; }
    .preview-pane img, .preview-pane svg { max-width: 100%; max-height: 420px; display: block; }
    .preview-label { font-size: 0.75rem; color: var(--muted); text-align: center; padding: 0.5rem 0.75rem; border-top: 1px solid var(--border); }
    .preview-pane-wrap { display: flex; flex-direction: column; }
    .preview-pane-wrap .preview-pane { flex: 1; border-radius: var(--radius) var(--radius) 0 0; border-bottom: none; }
    .preview-pane-wrap .preview-label { background: var(--surface); border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); }

    /* Checkerboard for SVG pane so transparent areas show */
    .svg-pane { background-image: linear-gradient(45deg, #1e1e21 25%, transparent 25%), linear-gradient(-45deg, #1e1e21 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1e1e21 75%), linear-gradient(-45deg, transparent 75%, #1e1e21 75%); background-size: 12px 12px; background-position: 0 0, 0 6px, 6px -6px, -6px 0px; background-color: #2a2a2e; }

    .settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .action-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }

    canvas { display: none; }
    @media (max-width: 600px) { .preview-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo"><svg viewBox="-323 -28 2446 296" height="18" xmlns="http://www.w3.org/2000/svg" aria-label="WMW" fill="currentColor"><polygon points="-279.60,-4.00 -298.80,10.40 -123.60,244.00 -104.40,229.60"/><polygon points="-54.00,229.60 -34.80,244.00 140.40,10.40 121.20,-4.00"/><polygon points="210.00,-4.00 190.80,10.40 366.00,244.00 385.20,229.60"/><polygon points="435.60,229.60 454.80,244.00 630.00,10.40 610.80,-4.00"/><polygon points="699.60,-4.00 680.40,10.40 855.60,244.00 874.80,229.60"/><polygon points="925.20,229.60 944.40,244.00 1119.60,10.40 1100.40,-4.00"/><polygon points="1189.20,-4.00 1170.00,10.40 1345.20,244.00 1364.40,229.60"/><polygon points="1414.80,229.60 1434.00,244.00 1609.20,10.40 1590.00,-4.00"/><polygon points="1678.80,-4.00 1659.60,10.40 1834.80,244.00 1854.00,229.60"/><polygon points="1904.40,229.60 1923.60,244.00 2098.80,10.40 2079.60,-4.00"/></svg></a>
      <ul><li><a href="/">Home</a></li><li><a href="/tools/" class="active">Tools</a></li></ul>
    </nav>
  </header>
  <main>
    <section class="hero" style="padding-bottom:1.5rem">
      <h1>Image Tracer</h1>
      <p>Trace a raster image to clean SVG vectors in your browser. Nothing is uploaded.</p>
    </section>

    <div class="tool-wrap">

      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif">
        <strong>Drop an image here</strong>
        <p>PNG, JPG, WebP &mdash; or click to select</p>
      </div>

      <div class="settings-panel">
        <div class="row">
          <div class="field">
            <label>Colours in palette</label>
            <select id="colors">
              <option value="4">4 &mdash; very flat</option>
              <option value="8">8 &mdash; simple</option>
              <option value="16" selected>16 &mdash; balanced</option>
              <option value="32">32 &mdash; detailed</option>
              <option value="64">64 &mdash; rich</option>
            </select>
          </div>
          <div class="field">
            <label>Smoothing</label>
            <select id="smoothing">
              <option value="high">High &mdash; fewer nodes</option>
              <option value="med" selected>Medium</option>
              <option value="low">Low &mdash; more faithful</option>
            </select>
          </div>
          <div class="field">
            <label>Noise suppression</label>
            <select id="noise">
              <option value="none" selected>None</option>
              <option value="light">Light blur</option>
              <option value="heavy">Heavy blur</option>
            </select>
          </div>
        </div>
        <div class="action-row">
          <button class="btn" id="trace-btn" onclick="trace()" disabled>Trace image</button>
          <p id="status" style="font-size:0.875rem; color:var(--muted); margin:0"></p>
        </div>
      </div>

      <div id="preview-area" style="display:none; flex-direction:column; gap:1rem">
        <div class="preview-row">
          <div class="preview-pane-wrap">
            <div class="preview-pane"><img id="orig-img" alt="Original"></div>
            <div class="preview-label" id="orig-label">Original</div>
          </div>
          <div class="preview-pane-wrap">
            <div class="preview-pane svg-pane" id="svg-pane"></div>
            <div class="preview-label" id="svg-label">SVG</div>
          </div>
        </div>
        <div class="action-row">
          <a class="btn" id="dl-btn" download="traced.svg" style="display:none">&#8595; Download SVG</a>
          <button class="btn-sm btn" id="copy-btn" style="display:none" onclick="copySVG()">Copy SVG</button>
        </div>
      </div>

    </div>
    <canvas id="cap"></canvas>
  </main>
  <footer><p>&copy; <span id="yr"></span> Wallace Wainhouse</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
  <script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  let loadedFile = null;
  let lastSVG = '';

  // ── Drop zone ─────────────────────────────────────────────────────────
  const dz = document.getElementById('drop-zone');
  const fi = document.getElementById('file-input');

  fi.addEventListener('change', e => { if (e.target.files[0]) load(e.target.files[0]); });
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = [...e.dataTransfer.files].find(f => f.type.startsWith('image/'));
    if (f) load(f);
  });

  function fmt(bytes) {
    return bytes < 1024 ? bytes + ' B'
      : bytes < 1048576 ? (bytes / 1024).toFixed(1) + ' KB'
      : (bytes / 1048576).toFixed(2) + ' MB';
  }

  function load(file) {
    loadedFile = file;
    const url = URL.createObjectURL(file);
    const img = document.getElementById('orig-img');
    img.src = url;
    img.onload = () => {
      document.getElementById('orig-label').textContent =
        `Original · ${img.naturalWidth}×${img.naturalHeight} · ${fmt(file.size)}`;
      document.getElementById('preview-area').style.display = 'flex';
      document.getElementById('trace-btn').disabled = false;
      document.getElementById('svg-pane').innerHTML = '';
      document.getElementById('dl-btn').style.display = 'none';
      document.getElementById('copy-btn').style.display = 'none';
      document.getElementById('status').textContent = '';
      lastSVG = '';
    };
  }

  // ── Trace ─────────────────────────────────────────────────────────────
  function trace() {
    if (!loadedFile) return;
    const btn = document.getElementById('trace-btn');
    btn.disabled = true;
    document.getElementById('status').textContent = 'Tracing…';

    const smoothMap = {
      high: { ltres: 3,   qtres: 3   },
      med:  { ltres: 1,   qtres: 1   },
      low:  { ltres: 0.3, qtres: 0.3 }
    };
    const noiseMap = {
      none:  { blurradius: 0, blurdelta: 20,  pathomit: 8  },
      light: { blurradius: 1, blurdelta: 60,  pathomit: 16 },
      heavy: { blurradius: 3, blurdelta: 120, pathomit: 32 }
    };

    const smooth = smoothMap[document.getElementById('smoothing').value];
    const noise  = noiseMap[document.getElementById('noise').value];
    const colors = parseInt(document.getElementById('colors').value);

    const options = {
      numberofcolors: colors,
      ltres:          smooth.ltres,
      qtres:          smooth.qtres,
      blurradius:     noise.blurradius,
      blurdelta:      noise.blurdelta,
      pathomit:       noise.pathomit,
      strokewidth:    0,
      viewbox:        true,
      desc:           false,
      linefilter:     true,
    };

    // Draw to canvas, resize if very large to keep tracing fast
    const img = document.getElementById('orig-img');
    const cap = document.getElementById('cap');
    const MAX = 1200;
    const scale = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
    cap.width  = Math.round(img.naturalWidth  * scale);
    cap.height = Math.round(img.naturalHeight * scale);
    cap.getContext('2d').drawImage(img, 0, 0, cap.width, cap.height);

    const imgData = cap.getContext('2d').getImageData(0, 0, cap.width, cap.height);

    // Defer to let the UI update first
    setTimeout(() => {
      try {
        const svg = ImageTracer.imagedataToSVG(imgData, options);
        lastSVG = svg;

        const pane = document.getElementById('svg-pane');
        pane.innerHTML = svg;
        const svgEl = pane.querySelector('svg');
        if (svgEl) { svgEl.style.maxWidth = '100%'; svgEl.style.maxHeight = '420px'; }

        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url  = URL.createObjectURL(blob);
        const dl = document.getElementById('dl-btn');
        dl.href = url;
        dl.download = (loadedFile.name.replace(/\.[^.]+$/, '') || 'traced') + '.svg';
        dl.style.display = 'inline-flex';

        document.getElementById('copy-btn').style.display = 'inline-flex';

        document.getElementById('svg-label').textContent =
          `SVG · ${cap.width}×${cap.height} · ${fmt(blob.size)}`;
        document.getElementById('status').textContent = '';
      } catch (err) {
        document.getElementById('status').textContent = 'Error: ' + err.message;
      }
      btn.disabled = false;
    }, 30);
  }

  function copySVG() {
    if (!lastSVG) return;
    navigator.clipboard.writeText(lastSVG).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy SVG'; }, 1800);
    });
  }
  </script>
</body>
</html>
